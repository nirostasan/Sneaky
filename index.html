// Track which obstacles the player has already seen
const seenObstacles = new Set();
let infoQueue = []; // queue of obstacle types to show
let infoOnClose = null; // callback after last info dismissed

function enqueueObstacleInfo(types, onClose) {
  infoQueue = [...types];
  infoOnClose = onClose;
  showNextInfo();
}

function showNextInfo() {
  if(!infoQueue.length){ if(infoOnClose) infoOnClose(); return; }
  const type = infoQueue.shift();
  const info = OBSTACLE_INFO[type];
  const isNew = !seenObstacles.has(type);
  seenObstacles.add(type);

  const badge = document.getElementById('info-badge');
  badge.textContent = isNew ? 'New!' : 'Reminder';
  badge.className = 'info-badge' + (isNew ? ' new' : '');

  document.getElementById('info-name').textContent = info.name;
  document.getElementById('info-desc').textContent = info.desc;

  const ok = document.getElementById('info-ok');
  ok.style.background = info.btnColor;
  ok.style.color = '#fff';

  // Animated illustration
  const ic = document.getElementById('info-canvas');
  const ictx = ic.getContext('2d');
  ic._animType = type;
  if(!ic._animRunning){
    ic._animRunning = true;
    function animInfo(){
      if(!ic._animRunning) return;
      drawInfoIllustration(ictx, ic.width, ic.height, ic._animType);
      requestAnimationFrame(animInfo);
    }
    requestAnimationFrame(animInfo);
  }

  document.getElementById('ov-info').classList.add('show');
}

function roundRectCtx(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ── Mini snake helper for illustrations ──
function drawMiniSnake(c, sx, sy, len, dir, color, alpha){
  const dxMap={R:1,L:-1,U:0,D:0}, dyMap={R:0,L:0,U:-1,D:1};
  const dx=dxMap[dir]||1, dy=dyMap[dir]||0;
  c.save(); c.globalAlpha=alpha??1;
  c.beginPath(); c.moveTo(sx,sy);
  for(let i=1;i<len;i++) c.lineTo(sx-dx*i*17, sy-dy*i*17);
  c.strokeStyle=color; c.lineWidth=12; c.lineCap='round'; c.lineJoin='round'; c.stroke();
  c.strokeStyle='rgba(255,255,255,0.2)'; c.lineWidth=4; c.stroke();
  c.beginPath(); c.arc(sx,sy,6.5,0,Math.PI*2); c.fillStyle=color; c.fill();
  const perp=dir==='R'||dir==='L'?[0,1]:[1,0];
  for(const s of[-1,1]){
    c.beginPath(); c.arc(sx+dx*3+perp[0]*s*3, sy+dy*3+perp[1]*s*3, 1.6,0,Math.PI*2);
    c.fillStyle='#111'; c.fill();
  }
  c.restore();
}

function drawArrow2(c, x1,y1,x2,y2, color, alpha){
  c.save(); c.globalAlpha=alpha??1;
  const a=Math.atan2(y2-y1,x2-x1);
  c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2);
  c.strokeStyle=color; c.lineWidth=2; c.lineCap='round'; c.stroke();
  c.beginPath();
  c.moveTo(x2,y2);
  c.lineTo(x2-9*Math.cos(a-0.4), y2-9*Math.sin(a-0.4));
  c.lineTo(x2-9*Math.cos(a+0.4), y2-9*Math.sin(a+0.4));
  c.closePath(); c.fillStyle=color; c.fill();
  c.restore();
}

function drawInfoIllustration(c, W, H, type){
  const t=performance.now()/1000;
  c.clearRect(0,0,W,H);
  c.fillStyle='#5cb83a'; roundRectCtx(c,0,0,W,H,12); c.fill();
  const g=c.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'rgba(200,240,100,.10)'); g.addColorStop(1,'rgba(0,50,0,.12)');
  c.fillStyle=g; c.fillRect(0,0,W,H);

  const cx=W/2, cy=H/2;
  const CP=34; // cell preview size

  if(type==='stone'){
    const loop=(t%2.8)/2.8;
    const stoneX=cx+20;
    const snakeX=loop<0.5 ? 22+(stoneX-CP*.4-22)*(loop/0.5) : stoneX-CP*.4-6;
    drawMiniSnake(c,snakeX,cy,3,'R','#f472b6');
    drawStonePreview(c,stoneX,cy,CP);
    if(loop>0.48&&loop<0.68){
      const f=Math.sin((loop-0.48)/0.2*Math.PI);
      c.save(); c.globalAlpha=f; c.font='18px sans-serif'; c.textAlign='center';
      c.fillText('💥',stoneX-CP*.5,cy-16); c.restore();
    }
    drawArrow2(c,snakeX+8,cy,stoneX-CP*.45,cy,'rgba(255,255,255,0.65)',loop<0.48?1:0.15);
  }

  else if(type==='bouncer'){
    const loop=(t%3)/3;
    const mushX=cx+10;
    let sx,dir;
    if(loop<0.35){      sx=20+(mushX-CP*.5-20)*(loop/0.35); dir='R'; }
    else if(loop<0.52){ sx=mushX-CP*.5; dir='R'; }
    else {              sx=mushX-CP*.5-(mushX-20)*((loop-0.52)/0.48); dir='L'; }
    drawMiniSnake(c,sx,cy,3,dir,'#60a5fa');
    drawBouncerPreview(c,mushX,cy,CP);
    if(loop>0.35&&loop<0.55){
      c.save(); c.globalAlpha=Math.sin((loop-0.35)/0.2*Math.PI);
      c.font='15px sans-serif'; c.fillStyle='#fff'; c.textAlign='center';
      c.fillText('↩',mushX-4,cy-20); c.restore();
    }
    drawArrow2(c,sx+8,cy-3,mushX-CP*.45,cy-3,'rgba(255,255,255,0.6)',loop<0.35?1:0);
    drawArrow2(c,mushX-CP*.45,cy+5,24,cy+5,'rgba(255,220,50,0.85)',loop>0.52?1:0);
  }

  else if(type==='tunnel'){
    const loop=(t%3.2)/3.2;
    const hL=cx-42, hR=cx+42;
    for(const [hx,col] of [[hL,'#f59e0b'],[hR,'#f59e0b']]){
      c.beginPath(); c.arc(hx,cy,15,0,Math.PI*2);
      c.strokeStyle=col; c.lineWidth=3; c.stroke();
      c.beginPath(); c.arc(hx,cy,12,0,Math.PI*2);
      c.fillStyle='#0a0a0f'; c.fill();
    }
    c.save(); c.setLineDash([4,5]); c.strokeStyle='rgba(245,158,11,0.5)'; c.lineWidth=1.5;
    c.beginPath(); c.moveTo(hL+15,cy); c.lineTo(hR-15,cy); c.stroke();
    c.setLineDash([]); c.restore();
    if(loop<0.36){
      const sx=14+(hL-14-14)*( loop/0.36);
      drawMiniSnake(c,sx,cy,3,'R','#4ade80');
    } else if(loop<0.54){
      const f=Math.sin((loop-0.36)/0.18*Math.PI);
      c.save(); c.globalAlpha=f*0.8; c.font='13px sans-serif'; c.fillStyle='#fff';
      c.textAlign='center'; c.fillText('···',cx,cy-20); c.restore();
    } else {
      const sx=hR+12+(W-16-(hR+12))*((loop-0.54)/0.46);
      drawMiniSnake(c,sx,cy,3,'R','#4ade80');
    }
  }

  else if(type==='navigator'){
    const loop=(t%2.8)/2.8;
    const navX=cx+6, navY=cy-4;
    drawNavigatorPreview(c,navX,navY,CP);
    if(loop<0.42){
      // snake approaching from left going R
      const sx=14+(navX-CP*.42-14)*(loop/0.42);
      drawMiniSnake(c,sx,navY,3,'R','#a78bfa');
      drawArrow2(c,sx+9,navY,navX-CP*.38,navY,'rgba(255,255,255,0.6)');
    } else {
      // deflected downward (D1: R→D)
      const prog=(loop-0.42)/0.58;
      const sy=navY+prog*38;
      drawMiniSnake(c,navX,sy,3,'D','#a78bfa');
      drawArrow2(c,navX,navY+6,navX,navY+40,'rgba(255,255,255,0.6)');
    }
  }

  else if(type==='bunny'){
    // Phase 0-0.30: snake approaches bunny
    // Phase 0.30-0.45: snake reaches bunny, bunny eaten, snake STOPS, pulsing ring
    // Phase 0.45-0.70: snake frozen, tap indicator pulses
    // Phase 0.70-1.00: snake resumes and exits right
    const loop=(t%3.2)/3.2;
    const bx=cx+8;
    const eatX=bx-8; // where head is when it eats

    if(loop<0.30){
      // approaching
      const sx=14+(eatX-14)*(loop/0.30);
      const ba=sx>bx-14 ? Math.max(0,1-(sx-(bx-14))/16) : 1;
      if(ba>0.02){ c.save(); c.globalAlpha=ba; drawBunnyPreview(c,bx,cy,CP); c.restore(); }
      drawMiniSnake(c,sx,cy,3,'R','#fbbf24');
      drawArrow2(c,sx+9,cy,bx-14,cy,'rgba(255,255,255,0.6)');
    }
    else if(loop<0.68){
      // stopped — bunny eaten, snake frozen with pulsing ring
      const freeze=(loop-0.30)/0.38;
      drawMiniSnake(c,eatX,cy,3,'R','#fbbf24');
      // pulsing ring
      const pulse=0.5+0.5*Math.sin(t*6);
      c.save();
      c.globalAlpha=pulse*0.9;
      c.beginPath(); c.arc(eatX,cy,11,0,Math.PI*2);
      c.strokeStyle='#fff'; c.lineWidth=2.5; c.stroke();
      c.beginPath(); c.arc(eatX,cy,11,0,Math.PI*2);
      c.strokeStyle='#fbbf24'; c.lineWidth=1.2; c.stroke();
      c.restore();
      // tap hint
      const tapAlpha=0.5+0.5*Math.sin(t*3);
      c.save(); c.globalAlpha=tapAlpha;
      c.font='bold 11px sans-serif'; c.fillStyle='#fff';
      c.textAlign='center'; c.fillText('tap to continue',W/2,H-9);
      c.restore();
      // eaten indicator
      if(freeze>0.15){
        c.save(); c.globalAlpha=Math.min(1,(freeze-0.15)/0.2);
        c.font='14px sans-serif'; c.textAlign='center';
        c.fillText('😋',bx,cy-22); c.restore();
      }
    }
    else {
      // resumed — snake exits right
      const sx=eatX+(W-14-eatX)*((loop-0.68)/0.32);
      drawMiniSnake(c,sx,cy,3,'R','#fbbf24');
      c.save(); c.globalAlpha=Math.max(0,1-(loop-0.68)/0.15);
      c.font='14px sans-serif'; c.textAlign='center';
      c.fillText('😋',bx,cy-22); c.restore();
    }
  }

  else if(type==='patrol_stone'){
    const px=28+(W-56)*((Math.sin(t*0.85)+1)/2);
    drawStonePreview(c,px,cy,CP);
    c.save(); c.setLineDash([3,5]); c.strokeStyle='rgba(255,255,255,0.25)'; c.lineWidth=1.5;
    c.beginPath(); c.moveTo(28,cy+22); c.lineTo(W-28,cy+22); c.stroke();
    c.setLineDash([]); c.restore();
    drawMiniSnake(c,16,cy,2,'R','#f472b6');
    c.font='bold 10px sans-serif'; c.fillStyle='rgba(255,255,255,0.55)';
    c.textAlign='center'; c.fillText('time your move!',W/2,H-9);
  }

  else if(type==='patrol_bunny'){
    const py=16+(H-36)*((Math.sin(t*0.85)+1)/2);
    c.save(); c.setLineDash([3,5]); c.strokeStyle='rgba(244,114,182,0.35)'; c.lineWidth=1.5;
    c.beginPath(); c.moveTo(cx+2,16); c.lineTo(cx+2,H-16); c.stroke();
    c.setLineDash([]); c.restore();
    drawBunnyPreview(c,cx+2,py,CP);
    drawMiniSnake(c,18,cy,2,'R','#34d399');
    c.font='bold 10px sans-serif'; c.fillStyle='rgba(255,255,255,0.55)';
    c.textAlign='center'; c.fillText('intercept the bunny!',W/2,H-9);
  }
}

function drawStonePreview(ictx, ox, oy, cellSize) {
  const rad = cellSize * 0.36;
  const pts = [
    [ .00,-.95],[ .45,-.72],[ .90,-.30],[ .95, .20],[ .60, .75],
    [ .05, .90],[-.55, .80],[-.90, .18],[-.70,-.55],[-.30,-.88],

function obstacleAtPixel(px, py) {
  const c = Math.floor((px-PAD)/CELL), r = Math.floor((py-PAD)/CELL);
  if(r<0||r>=ROWS||c<0||c>=COLS) return null;
  if(STONES.some(s=>Math.round(s.pr??s.r)===r&&Math.round(s.pc??s.c)===c)) return 'stone';
  if(BOUNCERS.some(b=>b.r===r&&b.c===c))    return 'bouncer';
  if(NAVIGATORS.some(n=>n.r===r&&n.c===c))  return 'navigator';
  if(BUNNIES.some(b=>!b.eaten&&Math.round(b.pr??b.r)===r&&Math.round(b.pc??b.c)===c)) return 'bunny';
  for(const pair of TUNNELS)
    if((pair[0].r===r&&pair[0].c===c)||(pair[1].r===r&&pair[1].c===c)) return 'tunnel';
  return null;
}

// WELCOME MUSIC — soft lullaby, auto-starts
// ─────────────────────────────────────────────
const WelcomeMusic = (() => {
  let ac = null, master = null, seq = null, nextTime = 0, step = 0;

  // ── Hand-composed melody in C major pentatonic ──
  // Each entry: [semitones above C4, duration in beats, velocity 0–1]
  // Two 16-beat phrases that repeat. Slow, singable, memorable.
  const MEL = [
    // Phrase A — gentle rise and curl
    [0,  1,  0.80], [4,  0.5,0.65], [7,  0.5,0.70], [9,  1.5,0.85],
    [7,  0.5,0.60], [4,  0.5,0.65], [5,  1,  0.70], [4,  1,  0.75],
    [2,  0.5,0.60], [4,  0.5,0.65], [7,  1,  0.80], [9,  2,  0.90],
    [7,  0.5,0.55], [5,  0.5,0.60], [4,  1,  0.70], [0,  2,  0.85],
    // Phrase B — climbs to the octave, floats back
    [5,  1,  0.70], [7,  0.5,0.65], [9,  0.5,0.75], [12, 1.5,0.90],
    [9,  0.5,0.60], [7,  0.5,0.65], [5,  1,  0.70], [4,  1,  0.75],
    [7,  1,  0.75], [9,  0.5,0.65], [12, 0.5,0.80], [14, 2,  0.95],
    [12, 0.5,0.60], [9,  0.5,0.65], [7,  1,  0.72], [0,  3,  0.88],
  ];

  // ── Counter-melody (lower, quieter, fills gaps) ──
  const COUNTER = [
    [-5, 2, 0.30], [0,  1, 0.25], [-3, 1, 0.28], [-5, 2, 0.30],
    [-7, 2, 0.28], [-5, 1, 0.25], [-3, 1, 0.28], [-5, 2, 0.30],
    [-3, 2, 0.28], [-5, 1, 0.25], [0,  1, 0.30], [-3, 2, 0.28],
    [-5, 2, 0.30], [-7, 1, 0.25], [-5, 1, 0.28], [-8, 4, 0.32],
    [-3, 2, 0.30], [-5, 1, 0.25], [-3, 1, 0.28], [-1, 2, 0.32],
    [-3, 2, 0.28], [-5, 1, 0.25], [-3, 1, 0.28], [-5, 2, 0.30],
    [-3, 2, 0.28], [0,  1, 0.30], [-3, 1, 0.28], [-1, 2, 0.32],
    [-5, 2, 0.30], [-7, 1, 0.25], [-5, 1, 0.28], [-12,4, 0.35],
  ];

  // ── Bass: root-fifth arpeggios, one per beat ──
  // Indexed by beat position mod 4
  const BASS_ARPS = [[0,0],[7,0],[4,0],[7,0]];

  const BPM   = 62;   // slow, dreamy
  const ROOT  = 60;   // C4

  function freq(semis) { return 440 * Math.pow(2, (ROOT + semis - 69) / 12); }

  function makeReverb(ctx) {
    const len = ctx.sampleRate * 2.5;
    const buf = ctx.createBuffer(2, len, ctx.sampleRate);
    for (let c = 0; c < 2; c++) {
      const d = buf.getChannelData(c);
      for (let i = 0; i < len; i++)
        d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 2.2) * (i < ctx.sampleRate*0.01 ? i/(ctx.sampleRate*0.01) : 1);
    }
    const conv = ctx.createConvolver(); conv.buffer = buf; return conv;
  }

  function note(f, wave, vol, atk, hold, rel, when, lpHz, detune) {
    if (!ac) return;
    const osc = ac.createOscillator(), g = ac.createGain(), lp = ac.createBiquadFilter();
    lp.type='lowpass'; lp.frequency.value=lpHz||800; lp.Q.value=0.5;
    osc.type=wave; osc.frequency.value=f;
    osc.detune.value=(Math.random()-0.5)*(detune||5);
    g.gain.setValueAtTime(0,when);
    g.gain.linearRampToValueAtTime(vol,when+atk);
    g.gain.setValueAtTime(vol,when+atk+hold);
    g.gain.exponentialRampToValueAtTime(0.0001,when+atk+hold+rel);
    osc.connect(lp); lp.connect(g); g.connect(master);
    osc.start(when); osc.stop(when+atk+hold+rel+0.05);
  }

  // Beat counter across whole sequence
  let beatPos = 0;
  let melStep = 0, counterStep = 0;

  function scheduleAhead() {
    if (!ac || !master) return;
    const beat = 60/BPM;
    const lookahead = 0.18;

    while (nextTime < ac.currentTime + lookahead) {
      const m = MEL[melStep % MEL.length];
      const co = COUNTER[counterStep % COUNTER.length];
      const [ms, md, mv] = m;
      const [cs, cd, cv] = co;
      const dur = md * beat;
      const cdur = cd * beat;

      // ── Main melody — warm sine with gentle shimmer ──
      note(freq(ms+12), 'sine', mv*0.16, 0.018, dur*0.55, dur*0.55, nextTime, 1100, 4);
      // Soft triangle doubling for warmth
      note(freq(ms+12), 'triangle', mv*0.055, 0.025, dur*0.45, dur*0.50, nextTime, 700, 6);
      // Octave-up shimmer on held notes
      if (md >= 1.5)
        note(freq(ms+24), 'sine', mv*0.038, 0.035, dur*0.40, dur*0.60, nextTime, 1400, 3);

      // ── Counter-melody — softer, lower ──
      note(freq(cs+12), 'sine', cv*0.14, 0.022, cdur*0.50, cdur*0.55, nextTime, 750, 5);

      // ── Bass arpeggios — one note per beat, very soft ──
      const barp = BASS_ARPS[Math.floor(beatPos) % 4];
      const bf = freq(barp[0] - 12);
      note(bf, 'sine', 0.055, 0.018, beat*0.45, beat*0.45, nextTime, 480, 3);
      // Add a soft fifth above
      if (Math.floor(beatPos) % 2 === 0)
        note(freq(barp[0] - 5), 'sine', 0.030, 0.030, beat*0.60, beat*0.50, nextTime+beat*0.5, 550, 3);

      // ── Celeste sparkle — tiny high bell on phrase starts ──
      if (melStep % 16 === 0) {
        [0,4,7,12].forEach((s,i) =>
          note(freq(s+24), 'sine', 0.028, 0.008, 0.12, 0.40, nextTime+i*0.07, 1800, 2));
      }

      nextTime += dur;
      beatPos  += md;
      melStep     = (melStep+1) % MEL.length;
      counterStep = (counterStep+1) % COUNTER.length;
    }
    seq = setTimeout(scheduleAhead, 60);
  }

  // Create AudioContext immediately — it starts suspended but notes can be pre-scheduled
  ac = new (window.AudioContext || window.webkitAudioContext)();
  master = ac.createGain();
  master.gain.setValueAtTime(0, ac.currentTime);
  master.gain.linearRampToValueAtTime(0.42, ac.currentTime + 2.5);
  const rev = makeReverb(ac);
  const revGain = ac.createGain(); revGain.gain.value = 0.38;
  master.connect(revGain); revGain.connect(rev); rev.connect(ac.destination);
  master.connect(ac.destination);

  // Pre-schedule notes from time 0 — will play immediately when context resumes
  nextTime = 0.05;
  beatPos = 0; melStep = 0; counterStep = 0;
  scheduleAhead();

  // Resume on any user gesture — notes play right away since they're pre-scheduled
  function resumeOnGesture() {
    if (ac.state === 'suspended') ac.resume();
    document.removeEventListener('pointerdown', resumeOnGesture, true);
    document.removeEventListener('keydown',     resumeOnGesture, true);
    document.removeEventListener('touchstart',  resumeOnGesture, true);
  }
  document.addEventListener('pointerdown', resumeOnGesture, true);
  document.addEventListener('keydown',     resumeOnGesture, true);
  document.addEventListener('touchstart',  resumeOnGesture, true);

  function start() {
    // Already running — just ensure resumed
    if (ac && ac.state === 'suspended') ac.resume();
  }

  function stop() {
    if (seq) { clearTimeout(seq); seq = null; }
    if (master && ac) {
      const now = ac.currentTime;
      master.gain.cancelScheduledValues(now);
      master.gain.setValueAtTime(master.gain.value, now);
      master.gain.linearRampToValueAtTime(0, now + 1.2);
    }
  }

  return { start, stop };
})();

requestAnimationFrame(()=>requestAnimationFrame(()=>{

    if(!animating){
      const dt = lastIdle ? Math.min((ts-lastIdle)/1000, 0.1) : 0;
      const hasPatrols = STONES.some(s=>s.patrol) || BUNNIES.some(b=>b.patrol&&!b.eaten);
      if(hasPatrols) updatePatrols(dt);
      updateObsAnims(dt);
      render();
    }
    lastIdle = ts;
    requestAnimationFrame(idleLoop);
  }
  requestAnimationFrame(idleLoop);

  // ── Welcome screen animation ──
  const wc = document.getElementById('welcome-canvas');
  const wctx = wc.getContext('2d');
  const W = wc.width, H = wc.height;
  const CX = W/2, CY = H/2;

  // ── tiny self-contained draw helpers that only use wctx ──
  function wStone(c, ox, oy, sz) {
    const rad = sz * 0.36;
    const pts = [[.00,-.95],[.45,-.72],[.90,-.30],[.95,.20],[.60,.75],[.05,.90],[-.55,.80],[-.90,.18],[-.70,-.55],[-.30,-.88]]
      .map(([px,py])=>[ox+px*rad, oy+py*rad]);
    c.save();
    c.beginPath(); pts.forEach(([x,y],i)=>i===0?c.moveTo(x+2,y+3):c.lineTo(x+2,y+3));
    c.closePath(); c.fillStyle='rgba(0,0,0,.2)'; c.fill();
    c.beginPath(); pts.forEach(([x,y],i)=>i===0?c.moveTo(x,y):c.lineTo(x,y));
    c.closePath();
    const g=c.createRadialGradient(ox-rad*.22,oy-rad*.28,rad*.05,ox+rad*.1,oy+rad*.1,rad*1.1);
    g.addColorStop(0,'#d4d0cc');g.addColorStop(.35,'#9e9b96');g.addColorStop(.72,'#6e6b66');g.addColorStop(1,'#45433f');
    c.fillStyle=g;c.fill();
    c.strokeStyle='rgba(0,0,0,.3)';c.lineWidth=1;c.lineJoin='round';c.stroke();
    c.beginPath();c.moveTo(ox-rad*.05,oy-rad*.85);c.lineTo(ox+rad*.38,oy-rad*.55);c.lineTo(ox+rad*.18,oy-rad*.10);c.lineTo(ox-rad*.32,oy-rad*.22);c.closePath();
    c.fillStyle='rgba(255,255,255,.18)';c.fill();
    c.restore();
  }

  function wMushroom(c, ox, oy, sz) {
    const capR=sz*.34, stemW=sz*.17, capY=oy-sz*.06;
    const stemTop=capY+capR*.55, stemBot=oy+sz*.38;
    c.save();
    const sg=c.createLinearGradient(ox-stemW,0,ox+stemW,0);
    sg.addColorStop(0,'#c8b89a');sg.addColorStop(.5,'#f0e6d0');sg.addColorStop(1,'#b8a484');
    c.fillStyle=sg;
    c.beginPath();c.moveTo(ox-stemW,stemBot-4);c.arcTo(ox-stemW,stemBot,ox+stemW,stemBot,4);
    c.arcTo(ox+stemW,stemBot,ox+stemW,stemTop,4);c.lineTo(ox+stemW,stemTop);c.lineTo(ox-stemW,stemTop);c.closePath();c.fill();
    c.beginPath();c.arc(ox,capY,capR,Math.PI,0);
    c.lineTo(ox+capR,capY+capR*.38);c.quadraticCurveTo(ox,capY+capR*.6,ox-capR,capY+capR*.38);c.closePath();
    const cg=c.createRadialGradient(ox-capR*.2,capY-capR*.3,capR*.05,ox,capY,capR*1.1);
    cg.addColorStop(0,'#ff6b6b');cg.addColorStop(.4,'#e53935');cg.addColorStop(1,'#b71c1c');
    c.fillStyle=cg;c.fill();c.strokeStyle='rgba(0,0,0,.2)';c.lineWidth=1;c.stroke();
    for(const[sx,sy,sr] of [[-capR*.42,-capR*.28,capR*.13],[capR*.40,-capR*.25,capR*.12],[capR*.05,-capR*.58,capR*.10]]){
      c.beginPath();c.arc(ox+sx,capY+sy,sr,0,Math.PI*2);c.fillStyle='rgba(255,255,255,.9)';c.fill();
    }
    c.restore();
  }

  function wTunnel(c, ox, oy, sz, col, phase) {
    const rad = sz * 0.36;
    const r = parseInt(col.slice(1,3),16), g2 = parseInt(col.slice(3,5),16), b = parseInt(col.slice(5,7),16);
    c.save();

    // Expanding pulse ring
    const pulse = (phase * 0.5) % 1;
    const ringR = rad + pulse * rad * 0.9;
    c.beginPath(); c.arc(ox, oy, ringR, 0, Math.PI*2);
    c.strokeStyle = `rgba(${r},${g2},${b},${(1-pulse)*0.6})`; c.lineWidth=4; c.stroke();

    // Outer glow
    c.beginPath(); c.arc(ox, oy, rad, 0, Math.PI*2);
    c.strokeStyle = `rgba(${r},${g2},${b},${0.25+0.2*Math.sin(phase*2.3)})`; c.lineWidth=8; c.stroke();

    // Colored rim
    c.beginPath(); c.arc(ox, oy, rad, 0, Math.PI*2);
    c.strokeStyle = col; c.lineWidth=3.5; c.stroke();

    // Dark void fill
    c.beginPath(); c.arc(ox, oy, rad-3, 0, Math.PI*2);
    c.fillStyle = '#0a0a0f'; c.fill();

    // Depth gradient
    const dg = c.createRadialGradient(ox, oy, 0, ox, oy, rad-3);
    dg.addColorStop(0,   'rgba(0,0,0,1)');
    dg.addColorStop(0.55,'rgba(0,0,0,0.85)');
    dg.addColorStop(0.82,'rgba(40,40,60,0.6)');
    dg.addColorStop(1,   'rgba(80,80,110,0)');
    c.beginPath(); c.arc(ox, oy, rad-3, 0, Math.PI*2); c.fillStyle=dg; c.fill();

    // Colored tint at bottom
    const tg = c.createRadialGradient(ox, oy+rad*.3, 0, ox, oy+rad*.3, rad*.55);
    tg.addColorStop(0, `rgba(${r},${g2},${b},0.18)`); tg.addColorStop(1, `rgba(${r},${g2},${b},0)`);
    c.beginPath(); c.arc(ox, oy, rad-3, 0, Math.PI*2); c.fillStyle=tg; c.fill();

    // Highlight crescent
    c.beginPath(); c.arc(ox, oy, rad-3, Math.PI*1.1, Math.PI*1.9);
    c.strokeStyle='rgba(255,255,255,0.12)'; c.lineWidth=3; c.stroke();

    c.restore();
  }

  function wNavigator(c, ox, oy, sz, angle) {
    const half = sz * 0.40;
    const x1=ox+Math.cos(angle)*half, y1=oy+Math.sin(angle)*half;
    const x2=ox-Math.cos(angle)*half, y2=oy-Math.sin(angle)*half;
    c.save();
    c.shadowColor='rgba(56,189,248,0.9)';c.shadowBlur=10;
    c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.strokeStyle='#38bdf8';c.lineWidth=4;c.lineCap='round';c.stroke();
    c.shadowBlur=0;
    c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.strokeStyle='#e0f7ff';c.lineWidth=1.5;c.stroke();
    c.fillStyle='#7dd3fc';
    c.beginPath();c.arc(x1,y1,3,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x2,y2,3,0,Math.PI*2);c.fill();
    c.restore();
  }

  function wBunny(c, ox, oy, sz, earWiggle) {
    const sc=sz*0.18, wv=Math.sin(earWiggle)*0.45;
    c.save();
    c.beginPath();c.ellipse(ox,oy+sc*2.2,sc*1.4,sc*.4,0,0,Math.PI*2);c.fillStyle='rgba(0,0,0,.12)';c.fill();
    c.beginPath();c.ellipse(ox,oy+sc*.8,sc*1.15,sc*1,0,0,Math.PI*2);c.fillStyle='#fff';c.fill();
    c.beginPath();c.ellipse(ox,oy-sc*.7,sc*.88,sc*.85,0,0,Math.PI*2);c.fillStyle='#fff';c.fill();
    for(const[side,ex]of[[-1,-sc*.45],[1,sc*.45]]){
      const ea=(ex<0?-.15:.15)+wv*side;
      c.beginPath();c.ellipse(ox+ex,oy-sc*2,sc*.24,sc*.76,ea,0,Math.PI*2);c.fillStyle='#f0eded';c.fill();
      c.beginPath();c.ellipse(ox+ex,oy-sc*2,sc*.12,sc*.50,ea,0,Math.PI*2);c.fillStyle='#f9a8d4';c.fill();
    }
    for(const ex of[-sc*.33,sc*.33]){
      c.beginPath();c.ellipse(ox+ex,oy-sc*.82,sc*.20,sc*.23,0,0,Math.PI*2);c.fillStyle='#fff';c.fill();
      c.beginPath();c.ellipse(ox+ex,oy-sc*.82,sc*.17,sc*.20,0,0,Math.PI*2);c.fillStyle='#1a1a2e';c.fill();
      c.beginPath();c.arc(ox+ex+sc*.07,oy-sc*.94,sc*.09,0,Math.PI*2);c.fillStyle='#fff';c.fill();
    }
    for(const ex of[-sc*.58,sc*.58]){
      const cg=c.createRadialGradient(ox+ex,oy-sc*.5,0,ox+ex,oy-sc*.5,sc*.32);
      cg.addColorStop(0,'rgba(255,140,170,.65)');cg.addColorStop(1,'rgba(255,140,170,0)');
      c.beginPath();c.ellipse(ox+ex,oy-sc*.5,sc*.32,sc*.20,0,0,Math.PI*2);c.fillStyle=cg;c.fill();
    }
    c.beginPath();c.arc(ox,oy-sc*.56,sc*.11,0,Math.PI*2);c.fillStyle='#f472b6';c.fill();
    c.beginPath();c.arc(ox,oy-sc*.38,sc*.22,.25,Math.PI-.25);
    c.strokeStyle='rgba(210,100,140,.75)';c.lineWidth=sc*.16;c.lineCap='round';c.stroke();
    c.beginPath();c.arc(ox+sc,oy+sc*.6,sc*.30,0,Math.PI*2);c.fillStyle='#f5f5f5';c.fill();
    c.restore();
  }

  function drawWelcome(ts) {
    const t = ts / 1000;
    wctx.clearRect(0, 0, W, H);

    // ── Background ──
    wctx.fillStyle = '#5cb83a';
    wctx.beginPath(); wctx.roundRect(0,0,W,H,24); wctx.fill();
    const bgGrad = wctx.createLinearGradient(0,0,W,H);
    bgGrad.addColorStop(0,'rgba(200,240,100,.13)'); bgGrad.addColorStop(1,'rgba(0,50,0,.16)');
    wctx.fillStyle=bgGrad; wctx.fillRect(0,0,W,H);
    // vignette
    const vig=wctx.createRadialGradient(CX,CY,60,CX,CY,160);
    vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,30,0,.18)');
    wctx.fillStyle=vig; wctx.fillRect(0,0,W,H);

    // ── 6 obstacles in a ring ──
    const OBS = [
      { label:'stone',     angle: Math.PI*0.05  },
      { label:'mushroom',  angle: Math.PI*0.38  },
      { label:'tunnel',    angle: Math.PI*0.72  },
      { label:'navigator', angle: Math.PI*1.05  },
      { label:'bunny',     angle: Math.PI*1.38  },
      { label:'patrol',    angle: Math.PI*1.72  },
    ];
    const RING_R = 106;

    for (const obs of OBS) {
      const floatA = obs.angle + Math.sin(t * 0.5 + obs.angle) * 0.04;
      const ox = CX + Math.cos(floatA) * RING_R;
      const oy = CY + Math.sin(floatA) * RING_R;
      const bob = Math.sin(t * 1.6 + obs.angle * 2.5) * 4;
      const SZ = 44;

      wctx.save();
      wctx.translate(ox, oy + bob);

      if (obs.label === 'stone') {
        wctx.rotate(Math.sin(t * 2.0 + 0.5) * 0.07);
        wStone(wctx, 0, 0, SZ);
      }
      else if (obs.label === 'mushroom') {
        const beat = (Math.sin(t * 2.8) + 1) / 2;
        wctx.scale(1 + beat * 0.06, 1 - beat * 0.09);
        wMushroom(wctx, 0, 0, SZ);
      }
      else if (obs.label === 'tunnel') {
        wTunnel(wctx, 0, 0, SZ, '#f59e0b', t);
      }
      else if (obs.label === 'navigator') {
        wNavigator(wctx, 0, 0, SZ, t * 0.55 + Math.PI/4);
      }
      else if (obs.label === 'bunny') {
        wBunny(wctx, 0, 0, SZ, t * 3.5 + obs.angle);
      }
      else if (obs.label === 'patrol') {
        const px = Math.sin(t * 1.3) * 16;
        // dashed trail first (behind stone)
        wctx.setLineDash([3,4]);
        wctx.strokeStyle='rgba(255,255,255,0.28)'; wctx.lineWidth=1.5;
        wctx.beginPath(); wctx.moveTo(-22, SZ*0.35); wctx.lineTo(22, SZ*0.35); wctx.stroke();
        wctx.setLineDash([]);
        // end dots
        for(const ex of [-22,22]){
          wctx.beginPath(); wctx.arc(ex, SZ*0.35, 3, 0, Math.PI*2);
          wctx.fillStyle='rgba(255,255,255,0.4)'; wctx.fill();
        }
        wctx.save(); wctx.translate(px, 0); wStone(wctx, 0, 0, SZ*0.85); wctx.restore();
      }

      wctx.restore();
    }

    // ── Central snake — S-curve that breathes ──
    const breathe = Math.sin(t * 1.3) * 4;
    const snakeColor = '#f472b6';
    // Control points for a nice S shape
    const sp = [
      [CX+28,  CY-62+breathe],
      [CX+28,  CY-38+breathe],
      [CX-14,  CY-16+breathe*.5],
      [CX+14,  CY+8+breathe*.5],
      [CX-20,  CY+32],
      [CX-20,  CY+58],
    ];

    // Body
    wctx.save();
    wctx.beginPath();
    wctx.moveTo(sp[0][0], sp[0][1]);
    for(let i=1;i<sp.length;i++){
      const [ax,ay]=sp[i-1],[bx,by]=sp[i];
      if(i===sp.length-1) wctx.lineTo(bx,by);
      else wctx.quadraticCurveTo(ax,ay,(ax+bx)/2,(ay+by)/2);
    }
    wctx.strokeStyle=snakeColor; wctx.lineWidth=28; wctx.lineCap='round'; wctx.lineJoin='round'; wctx.stroke();
    wctx.strokeStyle='rgba(255,255,255,0.2)'; wctx.lineWidth=9; wctx.stroke();

    // Tail nub
    const [tx,ty]=sp[sp.length-1];
    wctx.beginPath(); wctx.arc(tx,ty,8,0,Math.PI*2); wctx.fillStyle=snakeColor; wctx.fill();

    // Head
    const [hx,hy]=sp[0];
    const headAng = Math.atan2(sp[0][1]-sp[1][1], sp[0][0]-sp[1][0]);
    wctx.save();
    wctx.translate(hx,hy); wctx.rotate(headAng);
    wctx.beginPath(); wctx.arc(0,0,15,0,Math.PI*2); wctx.fillStyle=snakeColor; wctx.fill();
    // head shade
    const hg=wctx.createLinearGradient(-15,0,15,0);
    hg.addColorStop(0,'rgba(0,0,0,0)'); hg.addColorStop(1,'rgba(0,0,0,0.18)');
    wctx.fillStyle=hg; wctx.beginPath(); wctx.arc(0,0,15,0,Math.PI*2); wctx.fill();
    // eyes
    for(const ey of[-5.5,5.5]){
      wctx.beginPath();wctx.arc(7,ey,4.2,0,Math.PI*2);wctx.fillStyle='#fff';wctx.fill();
      wctx.beginPath();wctx.arc(8,ey,2.2,0,Math.PI*2);wctx.fillStyle='#111';wctx.fill();
      wctx.beginPath();wctx.arc(8.8,ey-1.2,0.9,0,Math.PI*2);wctx.fillStyle='#fff';wctx.fill();
    }
    // tongue
    if(Math.sin(t*4.2)>0.2){
      wctx.strokeStyle='#ff4d6d';wctx.lineWidth=2.2;wctx.lineCap='round';
      wctx.beginPath();wctx.moveTo(15,0);wctx.lineTo(22,0);wctx.stroke();
      wctx.beginPath();wctx.moveTo(22,0);wctx.lineTo(27,-4);wctx.stroke();
      wctx.beginPath();wctx.moveTo(22,0);wctx.lineTo(27,4);wctx.stroke();
    }
    wctx.restore();
    wctx.restore();

    // ── Floating sparkles ──
    for(let i=0;i<8;i++){
      const sa=(t*0.65+i*0.785)%(Math.PI*2);
      const sr=126+Math.sin(t*1.2+i*0.9)*10;
      const sx=CX+Math.cos(sa)*sr, sy=CY+Math.sin(sa)*sr;
      const alpha=0.35+0.3*Math.sin(t*2.1+i*1.4);
      const sparkR=1.8+Math.sin(t*3+i)*0.8;
      wctx.beginPath();wctx.arc(sx,sy,sparkR,0,Math.PI*2);
      wctx.fillStyle=`rgba(255,252,180,${alpha})`;wctx.fill();
    }
  }

  let welcomeRunning = true;
  function welcomeLoop(ts) {
    if (!welcomeRunning) return;
    drawWelcome(ts);
    requestAnimationFrame(welcomeLoop);
  }
  requestAnimationFrame(welcomeLoop);

  const welcomeEl = document.getElementById('welcome-screen');
  const btnStart  = document.getElementById('btn-start');

  btnStart.addEventListener('click', () => {
    welcomeEl.classList.add('hide');
    welcomeRunning = false;
    WelcomeMusic.stop();
    Music.unlock();
  });
}));

</script>
</body>
</html>
