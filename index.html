<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arrow Maze</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(170deg, #c8f5a0 0%, #a8e063 50%, #7dc95e 100%);
    min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    overflow: hidden; color: #2d5a1b;
  }

  #topbar {
    width: 100%; max-width: 480px;
    display: flex; align-items: center;
    padding: 16px 20px 8px; gap: 10px;
  }
  .icon-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,.55); border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform .12s, background .12s; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
  }
  .icon-btn:active { transform: scale(.88); background: rgba(255,255,255,.75); }
  .icon-btn svg { width: 20px; height: 20px; fill: #3a7d1e; }
  #level-label {
    font-size: 13px; font-weight: 800; color: #3a7d1e;
    letter-spacing: .1em; text-transform: uppercase;
    text-shadow: 0 1px 0 rgba(255,255,255,.5);
    min-width: 64px; text-align: center;
  }
  #level-nav {
    display: flex; align-items: center; gap: 2px; margin-left: 8px;
  }
  .level-nav-btn {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,.5); border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform .12s, background .12s;
    flex-shrink: 0;
  }
  .level-nav-btn:active { transform: scale(.85); background: rgba(255,255,255,.8); }
  .level-nav-btn:disabled { opacity: .3; cursor: default; pointer-events: none; }
  .level-nav-btn svg { width: 16px; height: 16px; fill: #3a7d1e; }
  #lives { display: flex; gap: 6px; margin-left: auto; }
  .heart { font-size: 22px; transition: transform .3s cubic-bezier(.36,.07,.19,.97), opacity .3s; }
  .heart.lost { opacity: .2; transform: scale(.7); }

  #stage {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 100%; padding: 12px; position: relative;
  }
  #maze-wrap {
    position: relative;
    filter: drop-shadow(0 8px 24px rgba(45,90,27,.35));
  }
  canvas#maze { display: block; border-radius: 20px; cursor: pointer; touch-action: none; }
  #hint { margin-top: 14px; font-size: 13px; font-weight: 800; color: #3a7d1e;
          text-shadow: 0 1px 0 rgba(255,255,255,.4); }

  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(168,224,99,.88); backdrop-filter: blur(10px);
    z-index: 100; gap: 16px; opacity: 0; pointer-events: none; transition: opacity .35s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }
  .ov-icon { font-size: 72px; animation: popIn .4s cubic-bezier(.36,.07,.19,.97) both; }
  .ov-title { font-size: 34px; font-weight: 900; color: #1e4d0a; animation: popIn .4s .08s cubic-bezier(.36,.07,.19,.97) both; }
  .ov-sub { font-size: 15px; color: #3a7d1e; animation: popIn .4s .14s cubic-bezier(.36,.07,.19,.97) both; }
  .ov-btn {
    margin-top: 10px; padding: 14px 40px; border-radius: 50px; border: none;
    font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 800;
    cursor: pointer; transition: transform .12s;
    animation: popIn .4s .2s cubic-bezier(.36,.07,.19,.97) both;
    box-shadow: 0 4px 14px rgba(0,0,0,.18);
  }
  .ov-btn:active { transform: scale(.93); }
  .btn-win  { background: #ff9f43; color: #fff; }
  .btn-lose { background: #ee5a24; color: #fff; }

  /* ── OBSTACLE INFO OVERLAY ── */
  #ov-info {
    position: fixed; inset: 0; z-index: 150;
    display: flex; align-items: center; justify-content: center;
    background: rgba(30,60,10,.55); backdrop-filter: blur(12px);
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  #ov-info.show { opacity: 1; pointer-events: all; }

  .info-card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 28px;
    padding: 32px 28px 24px;
    width: min(340px, 88vw);
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    animation: cardIn .35s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes cardIn { from{opacity:0;transform:scale(.7) translateY(20px)} to{opacity:1;transform:none} }

  .info-card canvas { border-radius: 16px; }

  .info-badge {
    font-size: 11px; font-weight: 900; letter-spacing: .12em;
    text-transform: uppercase; padding: 4px 12px; border-radius: 20px;
    background: #f0fdf4; color: #16a34a;
  }
  .info-badge.new { background: #fef9c3; color: #ca8a04; }

  .info-name {
    font-size: 26px; font-weight: 900; color: #1a1a2e; text-align: center;
  }
  .info-desc {
    font-size: 15px; font-weight: 600; color: #4b5563; text-align: center;
    line-height: 1.55;
  }
  .info-ok {
    margin-top: 6px; padding: 13px 44px; border-radius: 50px; border: none;
    font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 800;
    cursor: pointer; transition: transform .12s;
    box-shadow: 0 4px 14px rgba(0,0,0,.15);
  }
  .info-ok:active { transform: scale(.93); }

  .particle {
    position: fixed; pointer-events: none; font-size: 18px; z-index: 200;
    animation: flyOut .75s ease-out forwards;
  }
  @keyframes flyOut { to{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)} }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-9px)} 40%{transform:translateX(9px)}
    60%{transform:translateX(-6px)} 80%{transform:translateX(4px)}
  }
  .shaking { animation: shake .4s ease both; }

  /* ── WELCOME SCREEN ── */
  #welcome-screen {
    position: fixed; inset: 0; z-index: 300;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #c8f5a0 0%, #7dc95e 60%, #4a9e2e 100%);
    transition: opacity .5s, transform .5s;
  }
  #welcome-screen.hide { opacity: 0; pointer-events: none; transform: scale(1.04); }
  #welcome-inner { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  #welcome-title {
    font-size: 54px; font-weight: 900; color: #1a4d0a; text-align: center;
    line-height: 1.0; letter-spacing: -.01em;
    text-shadow: 0 3px 0 rgba(255,255,255,.35), 0 6px 18px rgba(0,0,0,.18);
  }
  #welcome-canvas { border-radius: 26px; box-shadow: 0 12px 40px rgba(0,0,0,.25); }
  #btn-start {
    padding: 16px 60px; border-radius: 50px; border: none;
    font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 900;
    background: #ff9f43; color: #fff; cursor: pointer; letter-spacing: .04em;
    box-shadow: 0 6px 24px rgba(255,159,67,.5);
    transition: transform .12s, box-shadow .12s;
  }
  #btn-start:active { transform: scale(.93); box-shadow: 0 2px 8px rgba(255,159,67,.4); }
</style>
</head>
<body>

<div id="topbar">
  <button class="icon-btn" id="btn-back">
    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </button>
  <button class="icon-btn" id="btn-reset">
    <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
  </button>
  <div id="level-nav">
    <button class="level-nav-btn" id="btn-prev-level">
      <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <span id="level-label">Level 1</span>
    <button class="level-nav-btn" id="btn-next-level">
      <svg viewBox="0 0 24 24"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg>
    </button>
  </div>
  <div id="lives">
    <span class="heart" id="h1">❤️</span>
    <span class="heart" id="h2">❤️</span>
    <span class="heart" id="h3">❤️</span>
  </div>
</div>

<div id="stage">
  <div id="maze-wrap"><canvas id="maze"></canvas></div>
  <div id="hint">Tap a snake to release it</div>
</div>

<div class="overlay" id="ov-win">
  <div class="ov-icon">🎉</div>
  <div class="ov-title">Cleared!</div>
  <div class="ov-sub" id="ov-win-sub">All snakes released!</div>
  <button class="ov-btn btn-win" id="btn-next">Next Level →</button>
</div>
<div class="overlay" id="ov-lose">
  <div class="ov-icon">💥</div>
  <div class="ov-title">Game Over</div>
  <div class="ov-sub">No lives left!</div>
  <button class="ov-btn btn-lose" id="btn-restart">Try Again</button>
</div>

<!-- Welcome screen -->
<div id="welcome-screen">
  <div id="welcome-inner">
    <h1 id="welcome-title">Sneaky</h1>
    <canvas id="welcome-canvas" width="300" height="300"></canvas>
    <button id="btn-start">▶ Play</button>
  </div>
</div>


<div id="ov-info">
  <div class="info-card">
    <span class="info-badge" id="info-badge">New!</span>
    <canvas id="info-canvas" width="200" height="110"></canvas>
    <div class="info-name" id="info-name">Stone</div>
    <div class="info-desc" id="info-desc">Description here.</div>
    <button class="info-ok" id="info-ok">Got it!</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// LEVELS — fully validated.
// Snake format: { id, color, cells, dirs }
//   dirs: [dirOfHead, dirOfTail] — if only one arrow, dirs has 1 element.
//   cells[0] = head end, cells[last] = tail end.
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
// LEVELS
// Each level: { cols, rows, snakes, stones?, bouncers?, tunnels? }
//   stones:   [{r,c}]            — kills snake on contact
//   bouncers: [{r,c}]            — reverses snake direction
//   tunnels:  [[{r,c},{r,c}],…]  — teleport pairs
// Obstacles are never placed on snake starting cells.
// Levels 1–4:  no obstacles
// Levels 5–8:  stones
// Levels 9–12: bouncers
// Levels 13–16: tunnels
// ─────────────────────────────────────────────
const LEVELS = [
  // ── TIER 1: NO OBSTACLES ─────────────────────
  // Level 1 — 6×6, 3 snakes
  { cols:6, rows:6,
    snakes:[
      {id:0,color:'#f472b6',dirs:['U'],     cells:[{r:1,c:1},{r:2,c:1},{r:3,c:1},{r:4,c:1}]},
      {id:1,color:'#60a5fa',dirs:['R','D'], cells:[{r:2,c:5},{r:2,c:4},{r:2,c:3},{r:3,c:3}]},
      {id:2,color:'#4ade80',dirs:['R'],     cells:[{r:4,c:5},{r:4,c:4},{r:4,c:3}]},
    ]},
  // Level 2 — 7×7, 4 snakes
  { cols:7, rows:7,
    snakes:[
      {id:0,color:'#f472b6',dirs:['U'],      cells:[{r:1,c:1},{r:2,c:1},{r:3,c:1},{r:4,c:1},{r:5,c:1}]},
      {id:1,color:'#60a5fa',dirs:['R','U'],  cells:[{r:3,c:4},{r:3,c:3},{r:2,c:3},{r:1,c:3},{r:1,c:4},{r:1,c:5}]},
      {id:2,color:'#fbbf24',dirs:['L'],      cells:[{r:5,c:2},{r:5,c:3},{r:5,c:4},{r:5,c:5},{r:5,c:6}]},
      {id:3,color:'#4ade80',dirs:['U','L'],  cells:[{r:2,c:6},{r:3,c:6},{r:4,c:6},{r:4,c:5}]},
    ]},
  // Level 3 — 8×8, 5 snakes + diagonal
  { cols:8, rows:8,
    snakes:[
      {id:0,color:'#f472b6',dirs:['U'],        cells:[{r:1,c:1},{r:2,c:1},{r:3,c:1},{r:4,c:1},{r:5,c:1},{r:6,c:1}]},
      {id:1,color:'#60a5fa',dirs:['R','L'],    cells:[{r:1,c:7},{r:1,c:6},{r:1,c:5},{r:1,c:4},{r:1,c:3}]},
      {id:2,color:'#fbbf24',dirs:['D'],        cells:[{r:7,c:7},{r:6,c:7},{r:5,c:7},{r:4,c:7},{r:3,c:7}]},
      {id:3,color:'#4ade80',dirs:['L','R'],    cells:[{r:7,c:1},{r:7,c:2},{r:7,c:3},{r:7,c:4},{r:7,c:5}]},
      {id:4,color:'#a78bfa',dirs:['UL','DR_'], cells:[{r:3,c:3},{r:4,c:4},{r:5,c:5},{r:6,c:6}]},
    ]},
  // Level 4 — 9×9, 6 snakes + diagonal
  { cols:9, rows:9,
    snakes:[
      {id:0,color:'#f472b6',dirs:['U'],        cells:[{r:1,c:1},{r:2,c:1},{r:3,c:1},{r:4,c:1},{r:5,c:1},{r:6,c:1},{r:7,c:1}]},
      {id:1,color:'#60a5fa',dirs:['R','L'],    cells:[{r:1,c:8},{r:1,c:7},{r:1,c:6},{r:1,c:5},{r:1,c:4},{r:1,c:3}]},
      {id:2,color:'#fbbf24',dirs:['D'],        cells:[{r:8,c:8},{r:7,c:8},{r:6,c:8},{r:5,c:8},{r:4,c:8},{r:3,c:8}]},
      {id:3,color:'#4ade80',dirs:['L','R'],    cells:[{r:8,c:1},{r:8,c:2},{r:8,c:3},{r:8,c:4},{r:8,c:5},{r:8,c:6}]},
      {id:4,color:'#a78bfa',dirs:['UL','DR_'], cells:[{r:3,c:3},{r:4,c:4},{r:5,c:5},{r:6,c:6}]},
      {id:5,color:'#fb923c',dirs:['R','R'],    cells:[{r:5,c:3},{r:5,c:2},{r:4,c:2},{r:3,c:2},{r:2,c:2},{r:2,c:3},{r:2,c:4}]},
    ]},

  // ── TIER 2: STONES ───────────────────────────
  // Level 5 — 7×7, 4 snakes, 2 stones
  { cols:7, rows:7,
    stones:[{r:2,c:4},{r:4,c:2}],
    snakes:[
      {id:0,color:'#f472b6',dirs:['U'],     cells:[{r:1,c:1},{r:2,c:1},{r:3,c:1},{r:4,c:1}]},
      {id:1,color:'#60a5fa',dirs:['R'],     cells:[{r:3,c:5},{r:3,c:4},{r:3,c:3},{r:3,c:2}]},
      {id:2,color:'#fbbf24',dirs:['D'],     cells:[{r:3,c:6},{r:2,c:6},{r:1,c:6},{r:1,c:5}]},
      {id:3,color:'#4ade80',dirs:['L','R'], cells:[{r:5,c:3},{r:5,c:4},{r:5,c:5},{r:5,c:6}]},
    ]},
  // Level 6 — 8×8, 5 snakes, 3 stones
  { cols:8, rows:8,
    stones:[{r:2,c:4},{r:4,c:2},{r:4,c:6},{r:6,c:4}],
    snakes:[
      {id:0,color:'#f472b6',dirs:['U'],        cells:[{r:1,c:1},{r:2,c:1},{r:3,c:1},{r:4,c:1}]},
      {id:1,color:'#60a5fa',dirs:['R','U'],    cells:[{r:3,c:6},{r:3,c:5},{r:2,c:5},{r:1,c:5},{r:1,c:6},{r:1,c:7}]},
      {id:2,color:'#fbbf24',dirs:['D'],        cells:[{r:4,c:7},{r:3,c:7},{r:2,c:7},{r:2,c:6}]},
      {id:3,color:'#4ade80',dirs:['L','L'],    cells:[{r:6,c:1},{r:6,c:2},{r:6,c:3},{r:5,c:3},{r:5,c:2}]},
      {id:4,color:'#a78bfa',dirs:['UL','DR_'], cells:[{r:5,c:5},{r:6,c:6},{r:7,c:7}]},
    ]},
  // Level 7 — 8×8, 5 snakes, 4 stones
  { cols:8, rows:8,
    stones:[{r:1,c:4},{r:4,c:1},{r:4,c:6},{r:6,c:3}],
    snakes:[
      {id:0,color:'#f472b6',dirs:['U'],        cells:[{r:2,c:2},{r:3,c:2},{r:4,c:2},{r:5,c:2}]},
      {id:1,color:'#60a5fa',dirs:['R','L'],    cells:[{r:1,c:6},{r:1,c:5},{r:2,c:5},{r:2,c:4},{r:2,c:3}]},
      {id:2,color:'#fbbf24',dirs:['D'],        cells:[{r:3,c:7},{r:2,c:7},{r:1,c:7},{r:2,c:6}]},
      {id:3,color:'#4ade80',dirs:['L'],        cells:[{r:6,c:2},{r:7,c:2},{r:7,c:3},{r:7,c:4},{r:7,c:5},{r:7,c:6},{r:6,c:6}]},
      {id:4,color:'#a78bfa',dirs:['DL','UR'],  cells:[{r:5,c:4},{r:4,c:5},{r:3,c:5},{r:3,c:4},{r:3,c:3}]},
    ]},
  // Level 8 — 9×9, 6 snakes, 5 stones
  { cols:9, rows:9,
    stones:[{r:2,c:4},{r:4,c:2},{r:4,c:6},{r:6,c:4},{r:4,c:4}],
    snakes:[
      {id:0,color:'#f472b6',dirs:['U'],        cells:[{r:1,c:1},{r:2,c:1},{r:3,c:1},{r:4,c:1},{r:5,c:1}]},
      {id:1,color:'#60a5fa',dirs:['R','L'],    cells:[{r:1,c:7},{r:1,c:6},{r:1,c:5},{r:1,c:4},{r:1,c:3}]},
      {id:2,color:'#fbbf24',dirs:['D'],        cells:[{r:6,c:7},{r:5,c:7},{r:4,c:7},{r:3,c:7},{r:2,c:7}]},
      {id:3,color:'#4ade80',dirs:['L','R'],    cells:[{r:7,c:1},{r:7,c:2},{r:7,c:3},{r:7,c:4},{r:7,c:5}]},
      {id:4,color:'#a78bfa',dirs:['DR_','UL'], cells:[{r:3,c:3},{r:3,c:2},{r:2,c:2},{r:2,c:3}]},
      {id:5,color:'#fb923c',dirs:['D'],        cells:[{r:5,c:5},{r:5,c:6},{r:6,c:6},{r:7,c:6},{r:7,c:7}]},
    ]},

  // ── TIER 3: BOUNCERS ─────────────────────────
  // Level 9 — 6x6, 4 snakes, 1 bouncer (MUST use bouncer to solve)
  // Pink fires D, hits bouncer at (3,3), reverses to U, exits top
  { cols:6, rows:6,
    bouncers:[{r:3,c:3}],
    snakes:[
      {id:0,color:'#f472b6',dirs:['D'],   cells:[{r:2,c:3},{r:2,c:2},{r:2,c:1},{r:3,c:1}]},
      {id:1,color:'#60a5fa',dirs:['R'],   cells:[{r:1,c:5},{r:1,c:4},{r:1,c:3},{r:1,c:2}]},
      {id:2,color:'#4ade80',dirs:['L'],   cells:[{r:4,c:1},{r:4,c:2},{r:4,c:3},{r:4,c:4}]},
      {id:3,color:'#fbbf24',dirs:['D'],   cells:[{r:4,c:5},{r:3,c:5},{r:2,c:5},{r:2,c:4}]},
    ]},
  // Level 10 — 8×8, 5 snakes, 2 bouncers
  { cols:8, rows:8,
    bouncers:[{r:2,c:4},{r:5,c:3}],
    snakes:[
      {id:0,color:'#f472b6',dirs:['U'],        cells:[{r:1,c:1},{r:2,c:1},{r:3,c:1},{r:4,c:1}]},
      {id:1,color:'#60a5fa',dirs:['R','L'],    cells:[{r:1,c:6},{r:1,c:5},{r:1,c:4},{r:1,c:3}]},
      {id:2,color:'#fbbf24',dirs:['D'],        cells:[{r:3,c:7},{r:2,c:7},{r:1,c:7},{r:2,c:6}]},
      {id:3,color:'#4ade80',dirs:['L','R'],    cells:[{r:6,c:1},{r:6,c:2},{r:6,c:3},{r:6,c:4},{r:6,c:5}]},
      {id:4,color:'#a78bfa',dirs:['UL','DR_'], cells:[{r:4,c:6},{r:5,c:7},{r:6,c:8}]},
    ]},
  // Level 11 — 9×9, 5 snakes, 3 bouncers
  { cols:9, rows:9,
    bouncers:[{r:2,c:5},{r:5,c:2},{r:6,c:6}],
    snakes:[
      {id:0,color:'#f472b6',dirs:['U'],        cells:[{r:1,c:1},{r:2,c:1},{r:3,c:1},{r:4,c:1},{r:5,c:1}]},

  ];

  function getVariation(lvl) {
    return VARIATIONS[Math.min(lvl, VARIATIONS.length - 1)];
  }

  // ── Shared reverb (convolver impulse) ──
  function makeReverb(ctx) {
    const len = ctx.sampleRate * 1.6;
    const buf = ctx.createBuffer(2, len, ctx.sampleRate);
    for (let c = 0; c < 2; c++) {
      const d = buf.getChannelData(c);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.6);
    }
    const conv = ctx.createConvolver(); conv.buffer = buf; return conv;
  }

  function init() {
    if (ac) return;
    ac = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ac.createGain();
    masterGain.gain.setValueAtTime(0, ac.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.38, ac.currentTime + 2.0);
    reverbNode = makeReverb(ac);
    const reverbGain = ac.createGain(); reverbGain.gain.value = 0.22;
    masterGain.connect(reverbGain); reverbGain.connect(reverbNode); reverbNode.connect(ac.destination);
    masterGain.connect(ac.destination);
  }

  function playNote(freq, wave, vol, attack, hold, release, when, filter, detune) {
    if (!ac) return;
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    const lp  = ac.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = filter; lp.Q.value = 0.6;
    osc.type = wave;
    osc.frequency.value = freq;
    osc.detune.value = (Math.random()-0.5) * (detune||4);
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vol, when + attack);
    g.gain.setValueAtTime(vol, when + attack + hold);
    g.gain.exponentialRampToValueAtTime(0.0001, when + attack + hold + release);
    osc.connect(lp); lp.connect(g); g.connect(masterGain);
    osc.start(when); osc.stop(when + attack + hold + release + 0.06);
  }

  function scheduleStep(step, when) {
    if (!v) return;
    const beat   = 60 / v.bpm;
    const eighth = beat / 2;
    const m      = MELODY[step];
    const rootM  = v.root + v.oct * 12 + v.melShift;
    const bass   = BASS_PATTERNS[v.bassKey];

    // ── Melody ──
    const mFreq  = noteFreq(rootM + m.s);
    const durMul = v.staccato ? 0.32 : m.d;
    const mDur   = durMul * eighth;
    const mHold  = mDur * 0.52;
    const mRel   = mDur * 0.60;
    playNote(mFreq, v.wave, v.melVol, 0.012, mHold, mRel, when, v.filterHz, v.detune);

    // Octave shimmer on held notes
    if (m.d >= 1.0 && !v.staccato) {
      playNote(mFreq * 2, 'sine', v.melVol * 0.16, 0.028, mHold * 0.55, mRel, when, v.filterHz * 1.4, v.detune);
    }

    // Echo layer (soft delayed repeat)
    if (v.echo && m.d >= 0.7) {
      playNote(mFreq, v.wave, v.melVol * 0.28, 0.01, mHold * 0.4, mRel * 1.2, when + eighth * 0.85, v.filterHz * 0.8, v.detune * 2);
    }

    // Arpeggio: on long notes, add a quick upper neighbor
    if (v.arp && m.d >= 1.0) {
      playNote(noteFreq(rootM + m.s + 4), 'sine', v.melVol * 0.45, 0.008, eighth * 0.2, eighth * 0.3, when + eighth * 0.45, v.filterHz * 1.2, 2);
      playNote(noteFreq(rootM + m.s + 7), 'sine', v.melVol * 0.35, 0.008, eighth * 0.2, eighth * 0.3, when + eighth * 0.75, v.filterHz * 1.2, 2);
    }

    // ── Bass (quarter note grid) ──
    if (step % 2 === 0) {
      const bi = Math.floor(step / 2) % bass.length;
      const bFreq = noteFreq(v.root + v.oct * 12 - 12 + bass[bi]);
      const bHold = v.staccato ? beat * 0.25 : beat * 0.55;
      playNote(bFreq, v.bassWave, v.bassVol, 0.018, bHold, beat * 0.5, when, v.filterHz * 0.65, v.detune);
    }

    // ── Harmony pad (phrase start) ──
    if (v.padVol > 0 && step % 8 === 0) {
      [[0, 0], [7, 0.05], [4, 0.10]].forEach(([s2, delay]) => {
        const pFreq = noteFreq(v.root + v.oct * 12 - 12 + s2);
        playNote(pFreq, 'sine', v.padVol, 0.08, beat * 3.2, beat * 1.8, when + delay, v.filterHz * 0.55, 8);
      });
    }
  }

  function tick() {
    if (!ac || !playing || !v) return;
    const eighth = (60 / v.bpm) / 2;
    const lookahead = 0.15;
    const now = ac.currentTime;
    while (seqNextTime < now + lookahead) {
      scheduleStep(seqStep, seqNextTime);
      seqNextTime += eighth;
      seqStep = (seqStep + 1) % MELODY.length;
    }
    seqTimer = setTimeout(tick, 50);
  }

  function start(lvlIdx) {
    pendingLevel = lvlIdx;
    if (!ac) return; // No AudioContext yet — unlock() will start it on Play click
    _doStart(lvlIdx);
  }

  function _doStart(lvlIdx) {
    init();
    if (ac.state === 'suspended') { ac.resume().then(()=>_doStart(lvlIdx)); return; }
    if (seqTimer) { clearTimeout(seqTimer); seqTimer = null; }
    playing = true;
    v = getVariation(lvlIdx);
    seqStep = 0;
    if (masterGain) {
      const now = ac.currentTime;
      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.linearRampToValueAtTime(0.38, now + 0.6);
    }
    seqNextTime = ac.currentTime + 0.65;
    tick();
  }

  // Call this once after the first user gesture to actually create AudioContext
  function unlock() {
    init();
    if (ac.state === 'suspended') ac.resume();
    if (pendingLevel !== null) _doStart(pendingLevel);
  }

  function playSfx(type) {
    if (!ac) return;
    const now = ac.currentTime;
    const f = v ? v.filterHz : 1000;
    const root = v ? v.root : 60;

    if (type === 'win') {
      // Rising joyful arpeggio
      [0,4,7,12,16].forEach((s,i) =>
        playNote(noteFreq(72+s),'sine',0.13,0.01,0.18,0.35,now+i*0.09,f*1.4,2));

    } else if (type === 'lose') {
      // Sad descending minor
      [0,-3,-5,-8].forEach((s,i) =>
        playNote(noteFreq(64+s),'triangle',0.10,0.01,0.2,0.4,now+i*0.13,f*0.6,4));

    } else if (type === 'stone') {
      // Heavy thud — low thump + sharp crack
      playNote(noteFreq(36),'triangle',0.18,0.003,0.04,0.28,now,300,2);   // deep thud
      playNote(noteFreq(52),'sawtooth',0.08,0.002,0.01,0.10,now,600,8);   // crack

    } else if (type === 'bounce') {
      // Springy boing — rising pitch sweep via two staggered notes
      playNote(noteFreq(60),'triangle',0.13,0.004,0.03,0.18,now,    f*0.9,3);
      playNote(noteFreq(72),'triangle',0.10,0.004,0.03,0.14,now+0.06,f*1.1,3);
      playNote(noteFreq(79),'sine',    0.07,0.004,0.02,0.12,now+0.11,f*1.3,2);

    } else if (type === 'tunnel_enter') {
      // Whoosh down — falling sweep
      const osc = ac.createOscillator(), g = ac.createGain(), lp = ac.createBiquadFilter();
      lp.type='lowpass'; lp.frequency.value=1200;
      osc.type='sine';
      osc.frequency.setValueAtTime(noteFreq(80), now);
      osc.frequency.exponentialRampToValueAtTime(noteFreq(48), now+0.35);
      g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.14,now+0.04);
      g.gain.exponentialRampToValueAtTime(0.0001,now+0.38);
      osc.connect(lp); lp.connect(g); g.connect(masterGain);
      osc.start(now); osc.stop(now+0.42);

    } else if (type === 'tunnel_exit') {
      // Pop up — rising sweep + bright ping
      const osc = ac.createOscillator(), g = ac.createGain(), lp = ac.createBiquadFilter();
      lp.type='lowpass'; lp.frequency.value=1600;
      osc.type='sine';
      osc.frequency.setValueAtTime(noteFreq(52), now);
      osc.frequency.exponentialRampToValueAtTime(noteFreq(80), now+0.22);
      g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.12,now+0.03);
      g.gain.exponentialRampToValueAtTime(0.0001,now+0.28);
      osc.connect(lp); lp.connect(g); g.connect(masterGain);
      osc.start(now); osc.stop(now+0.32);
      playNote(noteFreq(84),'sine',0.09,0.005,0.04,0.16,now+0.18,f*1.5,2);

    } else if (type === 'navigate') {
      // Crisp deflect ping — two quick high notes
      playNote(noteFreq(96),'sine',0.11,0.004,0.03,0.20,now,     f*2.0,2);
      playNote(noteFreq(91),'sine',0.08,0.004,0.03,0.16,now+0.07,f*1.8,2);

    } else if (type === 'eat') {
      // Cute nom — two rising soft pings with shimmer
      playNote(noteFreq(88),'sine',0.10,0.005,0.05,0.16,now,     f*2.2,2);
      playNote(noteFreq(95),'sine',0.08,0.005,0.04,0.14,now+0.07,f*2.4,2);
      playNote(noteFreq(100),'sine',0.05,0.005,0.03,0.12,now+0.13,f*2.6,2);

    } else if (type === 'exit') {
      // Cheerful little exit chime
      playNote(noteFreq(79),'sine',0.10,0.005,0.06,0.22,now,     f*1.0,2);
      playNote(noteFreq(84),'sine',0.08,0.005,0.06,0.20,now+0.07,f*1.2,2);
      playNote(noteFreq(88),'sine',0.06,0.005,0.05,0.18,now+0.13,f*1.4,2);
    }
  }

  function stop() {
    playing = false;
    if (seqTimer) { clearTimeout(seqTimer); seqTimer = null; }
    if (masterGain && ac) {
      const now = ac.currentTime;
      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.linearRampToValueAtTime(0, now + 0.8);
    }
  }

  return { start, stop, unlock, playSfx };
})();


let levelIdx=0, lives=3, snakes=[], COLS, ROWS, animating=false, hovered=null;
let STONES=[], BOUNCERS=[], TUNNELS=[], NAVIGATORS=[], BUNNIES=[];
// Obstacle hit animations: key = "type:r:c", value = {t: 0..1, type}
const obsAnims = {};
function triggerObsAnim(key, type, dur=0.45){
  obsAnims[key] = {t:0, type, dur};
}
function updateObsAnims(dt){
  for(const k of Object.keys(obsAnims)){
    obsAnims[k].t = Math.min(1, obsAnims[k].t + dt/obsAnims[k].dur);
    if(obsAnims[k].t>=1) delete obsAnims[k];
  }
}
function getObsAnim(key){ return obsAnims[key]||null; }

// ─── LOAD ───
function loadLevel(idx) {
  const lv = LEVELS[idx];
  COLS=lv.cols; ROWS=lv.rows;
  canvas.width  = COLS*CELL + PAD*2;
  canvas.height = ROWS*CELL + PAD*2;
  snakes = lv.snakes.map(s=>({...s, dirs:[...s.dirs], cells:s.cells.map(c=>({...c})), alive:true, tunnelHidden:0, frozen:null}));
  STONES     = (lv.stones     || []).map(c=>({...c, pr:c.r, pc:c.c}));
  BOUNCERS   = (lv.bouncers   || []).map(c=>({...c}));
  TUNNELS    = (lv.tunnels    || []).map(pair=>pair.map(c=>({...c})));
  NAVIGATORS = (lv.navigators || []).map(c=>({...c}));
  BUNNIES    = (lv.bunnies    || []).map(c=>({...c, eaten:false, pr:c.r, pc:c.c}));
  // Init patrol animation state
  for(const s of STONES)  if(s.patrol){ s.pt=0; s.pdir=1; }
  for(const b of BUNNIES) if(b.patrol){ b.pt=0; b.pdir=1; }
  animating=false; hovered=null;
  Music.start(idx);
  buildDecor();
  document.getElementById('level-label').textContent=`Level ${idx+1}`;
  document.getElementById('hint').textContent = 'Tap a snake to release it';
  updateHearts(); updateLevelNav(); fitCanvas(); render();

  // Show info for any new obstacles on this level
  const newTypes = [];
  if(STONES.length     && !seenObstacles.has('stone'))     newTypes.push('stone');
  if(BOUNCERS.length   && !seenObstacles.has('bouncer'))   newTypes.push('bouncer');
  if(TUNNELS.length    && !seenObstacles.has('tunnel'))    newTypes.push('tunnel');
  if(NAVIGATORS.length && !seenObstacles.has('navigator')) newTypes.push('navigator');
  if(BUNNIES.length    && !seenObstacles.has('bunny'))     newTypes.push('bunny');
  if(STONES.some(s=>s.patrol)  && !seenObstacles.has('patrol_stone')) newTypes.push('patrol_stone');
  if(BUNNIES.some(b=>b.patrol) && !seenObstacles.has('patrol_bunny')) newTypes.push('patrol_bunny');
  if(newTypes.length) enqueueObstacleInfo(newTypes, null);
}

// ─── GRASS BOARD DECORATION ───
let grassDecor = []; // blob patches + sparse flowers

function buildDecor() {
  grassDecor = [];
  const rng = mulberry32(COLS * 1000 + ROWS);

  // Flowers
  for(let r = 0; r < ROWS; r++) {
    for(let c = 0; c < COLS; c++) {
      if(rng() < 0.08) {
        const fx = PAD + c*CELL + CELL/2 + (rng()-.5)*CELL*.5;
        const fy = PAD + r*CELL + CELL/2 + (rng()-.5)*CELL*.5;
        grassDecor.push({ type:'flower', fx, fy, flowerType: Math.floor(rng()*3) });
      } else { rng(); rng(); }
    }
  }

  // Interior grass tufts — scattered across the field
  const tuftsPerCell = 1.2;
  const totalTufts = Math.round(COLS * ROWS * tuftsPerCell);
  const boardW = COLS * CELL, boardH = ROWS * CELL;
  for(let i = 0; i < totalTufts; i++) {
    const px = (rng()) * boardW;
    const py = (rng()) * boardH;
    const blades = 2 + Math.floor(rng() * 3); // 2–4 spikes per tuft
    const h  = CELL * (0.08 + rng() * 0.10);  // spike height
    const spread = CELL * (0.06 + rng() * 0.07);
    const lean = (rng() - 0.5) * 0.6;
    const dark = rng() < 0.45; // mix lighter and darker spikes
    grassDecor.push({ type:'tuft', px, py, blades, h, spread, lean, dark });
  }

  // Edge tufts — denser along all 4 borders
  const edgeStep = CELL * 0.55;
  const edgeH = CELL * (0.14);
  function addEdgeTuft(px, py, angle) {
    const h = edgeH * (0.7 + rng() * 0.6);
    grassDecor.push({ type:'edge_tuft', px, py, h, angle,
      blades: 2 + Math.floor(rng()*3), spread: CELL*0.08, lean:(rng()-.5)*.5 });
  }
  // Top edge
  for(let x = 0; x < boardW; x += edgeStep * (0.6 + rng()*0.8))
    addEdgeTuft(x, 2, -Math.PI/2);
  // Bottom edge
  for(let x = 0; x < boardW; x += edgeStep * (0.6 + rng()*0.8))
    addEdgeTuft(x, boardH - 2, Math.PI/2);
  // Left edge
  for(let y = 0; y < boardH; y += edgeStep * (0.6 + rng()*0.8))
    addEdgeTuft(2, y, Math.PI);
  // Right edge
  for(let y = 0; y < boardH; y += edgeStep * (0.6 + rng()*0.8))
    addEdgeTuft(boardW - 2, y, 0);
}

function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function drawBoard() {
  // Outer board background — rich soil/earth
  const boardX = PAD, boardY = PAD;
  const boardW = COLS*CELL, boardH = ROWS*CELL;

  // Soil base
  ctx.fillStyle = '#c8a96e';
  rRect(ctx, boardX, boardY, boardW, boardH, 12); ctx.fill();

  // Soil texture gradient
  const soilGrad = ctx.createLinearGradient(boardX, boardY, boardX, boardY+boardH);
  soilGrad.addColorStop(0, 'rgba(180,130,70,.3)');
  soilGrad.addColorStop(1, 'rgba(100,65,20,.2)');
  rRect(ctx, boardX, boardY, boardW, boardH, 12);
  ctx.fillStyle = soilGrad; ctx.fill();

  // ── Seamless grass field ──
  ctx.save();
  rRect(ctx, boardX, boardY, boardW, boardH, 12); ctx.clip();

  // 1. Solid warm base green
  ctx.fillStyle = '#5cb83a';
  ctx.fillRect(boardX, boardY, boardW, boardH);

  // 2. Gentle diagonal lighting (top-left brighter, bottom-right deeper)
  const diag = ctx.createLinearGradient(boardX, boardY, boardX+boardW, boardY+boardH);
  diag.addColorStop(0,   'rgba(200,240,100,.14)');
  diag.addColorStop(0.5, 'rgba(0,0,0,.0)');
  diag.addColorStop(1,   'rgba(0,50,0,.18)');
  ctx.fillStyle = diag;
  ctx.fillRect(boardX, boardY, boardW, boardH);

  // 3. Soft vignette — edges slightly darker
  const vig = ctx.createRadialGradient(
    boardX+boardW/2, boardY+boardH/2, Math.min(boardW,boardH)*.25,
    boardX+boardW/2, boardY+boardH/2, Math.max(boardW,boardH)*.75
  );
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,30,0,.16)');
  ctx.fillStyle = vig;
  ctx.fillRect(boardX, boardY, boardW, boardH);

  // 4. Grass tufts — interior and edge spikes
  ctx.lineCap = 'round';
  for(const d of grassDecor) {
    if(d.type === 'tuft' || d.type === 'edge_tuft') {
      const bx = boardX + d.px, by = boardY + d.py;
      // Lighter spikes for interior, darker for edges
      const light = d.type === 'edge_tuft' ? '#3d9228' : (d.dark ? '#3a9125' : '#72c94a');
      ctx.fillStyle = light;
      ctx.save();
      ctx.translate(bx, by);
      if(d.type === 'edge_tuft') ctx.rotate(d.angle + Math.PI/2);
      // Draw each spike as a slim triangle
      const spacing = (d.blades - 1) === 0 ? 0 : d.spread * 2 / (d.blades - 1);
      for(let i = 0; i < d.blades; i++) {
        const ox = d.blades > 1 ? -d.spread + i * spacing : 0;
        const tipX = ox + d.lean * d.h * (i - (d.blades-1)/2) * 0.4;
        const tipY = -d.h * (0.75 + Math.abs(i - (d.blades-1)/2) * 0.15);
        const w = d.h * 0.18;
        ctx.beginPath();
        ctx.moveTo(ox - w, 0);
        ctx.lineTo(tipX, tipY);
        ctx.lineTo(ox + w, 0);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }
  }

  // 5. Flowers / mushrooms
  for(const d of grassDecor) {
    if(d.type !== 'flower') continue;
    if(d.flowerType===0) drawDaisy(d.fx, d.fy);
    else if(d.flowerType===1) drawClover(d.fx, d.fy);
    else drawMushroom(d.fx, d.fy);
  }

  ctx.restore();

  // ── Draw patrol trails ──
  ctx.save();
  ctx.setLineDash([3,5]);
  ctx.lineWidth=1.5;
  for(const s of STONES) if(s.patrol){
    ctx.strokeStyle='rgba(120,110,100,0.35)';
    ctx.beginPath();
    ctx.moveTo(PAD+s.patrol[0].c*CELL+CELL/2, PAD+s.patrol[0].r*CELL+CELL/2);
    ctx.lineTo(PAD+s.patrol[1].c*CELL+CELL/2, PAD+s.patrol[1].r*CELL+CELL/2);
    ctx.stroke();
    drawSpeedBadge(s.patrol[0], s.patrol[1], s.speed||'medium', 'rgba(80,70,60,0.7)');
  }
  for(const b of BUNNIES) if(b.patrol&&!b.eaten){
    ctx.strokeStyle='rgba(244,114,182,0.3)';
    ctx.beginPath();
    ctx.moveTo(PAD+b.patrol[0].c*CELL+CELL/2, PAD+b.patrol[0].r*CELL+CELL/2);
    ctx.lineTo(PAD+b.patrol[1].c*CELL+CELL/2, PAD+b.patrol[1].r*CELL+CELL/2);
    ctx.stroke();
    drawSpeedBadge(b.patrol[0], b.patrol[1], b.speed||'medium', 'rgba(200,80,140,0.7)');
  }
  ctx.setLineDash([]);
  ctx.restore();

  // ── Draw obstacles ──
  for(const s of STONES)   drawStone(s.pr ?? s.r, s.pc ?? s.c);
  for(const b of BOUNCERS) drawBouncer(b.r, b.c);
  const TUNNEL_COLORS = ['#f59e0b','#10b981','#ef4444','#3b82f6','#ec4899','#8b5cf6'];
  TUNNELS.forEach((pair,pi)=>{
    const col = TUNNEL_COLORS[pi % TUNNEL_COLORS.length];
    drawTunnel(pair[0].r,pair[0].c, col);
    drawTunnel(pair[1].r,pair[1].c, col);
  });
  for(const n of NAVIGATORS) drawNavigator(n.r, n.c, n.orient);
  for(const b of BUNNIES){
    if(!b.eaten){
      drawBunny(b.pr ?? b.r, b.pc ?? b.c, 0.35);
    } else {
      // Draw departing bunny animation after being eaten
      const anim = getObsAnim(`bunny:${Math.round(b.pr??b.r)}:${Math.round(b.pc??b.c)}`);
      if(anim){
        const bx = PAD+(b.pc??b.c)*CELL+CELL/2;
        const by = PAD+(b.pr??b.r)*CELL+CELL/2;
        ctx.save();
        ctx.globalAlpha = 1-anim.t;
        ctx.translate(bx, by - anim.t*CELL*0.7); // hop up
        ctx.rotate(anim.t * Math.PI * 1.5);       // spin
        ctx.scale(1-anim.t*0.5, 1-anim.t*0.5);   // shrink
        ctx.translate(-bx, -(by - anim.t*CELL*0.7));
        drawBunny(b.pr??b.r, b.pc??b.c, anim.t*1.5);
        ctx.restore();
      }
    }
  }

  // Thin black border
  ctx.strokeStyle = 'rgba(0,0,0,0.7)';
  ctx.lineWidth = 1.5;
  rRect(ctx, boardX, boardY, boardW, boardH, 12); ctx.stroke();
}

function drawDaisy(x, y) {
  const r = CELL*.055;
  const pr = CELL*.04;
  ctx.fillStyle = '#fff';
  for(let i=0; i<6; i++){
    const a = (Math.PI*2/6)*i;
    ctx.beginPath();
    ctx.ellipse(x+Math.cos(a)*r*1.6, y+Math.sin(a)*r*1.6, r, r*.6, a, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.beginPath(); ctx.arc(x,y,pr,0,Math.PI*2);
  ctx.fillStyle='#f9ca24'; ctx.fill();
}

function drawClover(x, y) {
  const r = CELL*.05;
  ctx.fillStyle = '#27ae60';
  for(let i=0;i<3;i++){
    const a = (Math.PI*2/3)*i - Math.PI/2;
    ctx.beginPath();
    ctx.arc(x+Math.cos(a)*r*1.1, y+Math.sin(a)*r*1.1, r, 0, Math.PI*2);
    ctx.fill();
  }
  // stem
  ctx.strokeStyle='#27ae60'; ctx.lineWidth=1; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x,y+r); ctx.lineTo(x,y+r*2.5); ctx.stroke();
}

function drawMushroom(x, y) {
  const r = CELL*.055;
  // cap
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath(); ctx.arc(x, y-r*.2, r, Math.PI, 0); ctx.closePath(); ctx.fill();
  // stem
  ctx.fillStyle = '#ffeaa7';
  ctx.fillRect(x-r*.4, y-r*.2, r*.8, r*.9);
  // spots
  ctx.fillStyle = 'rgba(255,255,255,.8)';
  ctx.beginPath(); ctx.arc(x-r*.2, y-r*.5, r*.18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+r*.3, y-r*.3, r*.13, 0, Math.PI*2); ctx.fill();
}

function drawStone(r, c) {
  const x=PAD+c*CELL, y=PAD+r*CELL, s=CELL;
  const anim = getObsAnim(`stone:${Math.round(r)}:${Math.round(c)}`);
  let mx=x+s/2, my=y+s/2;

  ctx.save();
  if(anim){
    // shake: rapid oscillation in first half, then fade
    const shake = Math.sin(anim.t * Math.PI * 10) * (1-anim.t) * s*0.12;
    mx += shake; my += shake*0.5;
    // red flash overlay after scale
    if(anim.t > 0.3){
      const flash = Math.sin((anim.t-0.3)/0.7 * Math.PI) * 0.7;
      ctx.globalAlpha = 1;
      // draw a red tint circle on top later
    }
  }

  const rad=s*.36;
  const pts = [
    [ .00,-.95],[ .45,-.72],[ .90,-.30],[ .95, .20],[ .60, .75],
    [ .05, .90],[-.55, .80],[-.90, .18],[-.70,-.55],[-.30,-.88],
  ].map(([px,py])=>[mx+px*rad, my+py*rad]);

  ctx.beginPath(); pts.forEach(([px,py],i)=>i===0?ctx.moveTo(px+3,py+4):ctx.lineTo(px+3,py+4));
  ctx.closePath(); ctx.fillStyle='rgba(0,0,0,.22)'; ctx.fill();

  ctx.beginPath(); pts.forEach(([px,py],i)=>i===0?ctx.moveTo(px,py):ctx.lineTo(px,py));
  ctx.closePath();
  const g=ctx.createRadialGradient(mx-rad*.22,my-rad*.28,rad*.05,mx+rad*.1,my+rad*.1,rad*1.1);
  g.addColorStop(0,'#d4d0cc'); g.addColorStop(.35,'#9e9b96'); g.addColorStop(.72,'#6e6b66'); g.addColorStop(1,'#45433f');
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.lineWidth=1.2; ctx.lineJoin='round'; ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(mx-rad*.05,my-rad*.85); ctx.lineTo(mx+rad*.38,my-rad*.55);
  ctx.lineTo(mx+rad*.18,my-rad*.10); ctx.lineTo(mx-rad*.32,my-rad*.22);
  ctx.closePath(); ctx.fillStyle='rgba(255,255,255,.18)'; ctx.fill();

  ctx.beginPath(); ctx.ellipse(mx-rad*.40,my-rad*.42,rad*.14,rad*.08,-0.6,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.28)'; ctx.fill();

  ctx.strokeStyle='rgba(0,0,0,.28)'; ctx.lineWidth=1.2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(mx+rad*.08,my-rad*.38); ctx.lineTo(mx+rad*.28,my+rad*.05); ctx.lineTo(mx+rad*.18,my+rad*.38); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx-rad*.18,my+rad*.05); ctx.lineTo(mx-rad*.42,my+rad*.38); ctx.stroke();

  // Red flash on hit
  if(anim && anim.t > 0.25){
    const flash = Math.sin((anim.t-0.25)/0.75 * Math.PI) * 0.55;
    ctx.beginPath(); pts.forEach(([px,py],i)=>i===0?ctx.moveTo(px,py):ctx.lineTo(px,py));
    ctx.closePath(); ctx.fillStyle=`rgba(255,60,60,${flash})`; ctx.fill();
  }

  ctx.restore();
}

// ── BOUNCER ── Mario-style bouncy mushroom
function drawBouncer(r, c) {
  const x=PAD+c*CELL, y=PAD+r*CELL, s=CELL;
  const anim = getObsAnim(`bouncer:${r}:${c}`);
  let scaleY=1, scaleX=1, offY=0;
  if(anim){
    // squish down then spring up overshoot
    const t=anim.t;
    if(t<0.25){ scaleY=1-0.45*(t/0.25); scaleX=1+0.3*(t/0.25); }
    else if(t<0.55){ const p=(t-0.25)/0.30; scaleY=0.55+0.65*p; scaleX=1.3-0.4*p; }
    else { const p=(t-0.55)/0.45; scaleY=1.2-0.2*p; scaleX=0.9+0.1*p; }
    offY=(1-scaleY)*s*0.3;
  }

  const mx=x+s/2, my=y+s/2;
  const capR = s*.34, stemW = s*.18;
  const capY  = my - s*.06;

  ctx.save();
  ctx.translate(mx, my);
  ctx.scale(scaleX, scaleY);
  ctx.translate(-mx, -my+offY);

  const stemTop = capY + capR*.55;
  const stemBot = my + s*.38;
  const sg = ctx.createLinearGradient(mx-stemW, 0, mx+stemW, 0);
  sg.addColorStop(0,'#c8b89a'); sg.addColorStop(0.3,'#f0e6d0'); sg.addColorStop(0.7,'#e8d8bc'); sg.addColorStop(1,'#b8a484');
  ctx.fillStyle = sg;
  ctx.beginPath();
  ctx.moveTo(mx-stemW, stemBot-4); ctx.arcTo(mx-stemW,stemBot,mx+stemW,stemBot,4);
  ctx.arcTo(mx+stemW,stemBot,mx+stemW,stemTop,4); ctx.lineTo(mx+stemW,stemTop);
  ctx.lineTo(mx-stemW,stemTop); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=1; ctx.stroke();

  ctx.fillStyle='rgba(180,150,100,.5)';
  ctx.beginPath(); ctx.ellipse(mx-stemW*.4,stemTop+s*.22*.35,stemW*.22,stemW*.18,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(mx+stemW*.4,stemTop+s*.22*.65,stemW*.22,stemW*.18,0,0,Math.PI*2); ctx.fill();

  ctx.beginPath();
  ctx.arc(mx,capY,capR,Math.PI,0);
  ctx.lineTo(mx+capR,capY+capR*.38);
  ctx.quadraticCurveTo(mx,capY+capR*.6,mx-capR,capY+capR*.38);
  ctx.closePath();
  const cg=ctx.createRadialGradient(mx-capR*.2,capY-capR*.3,capR*.05,mx,capY,capR*1.1);
  cg.addColorStop(0,'#ff6b6b'); cg.addColorStop(0.4,'#e53935'); cg.addColorStop(1,'#b71c1c');
  ctx.fillStyle=cg; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=1.2; ctx.stroke();

  for(const [sx,sy,sr] of [[-capR*.42,-capR*.28,capR*.13],[capR*.40,-capR*.25,capR*.12],[capR*.05,-capR*.58,capR*.10],[-capR*.15,capR*.08,capR*.09],[capR*.38,capR*.10,capR*.08]]){
    ctx.beginPath(); ctx.arc(mx+sx,capY+sy,sr,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.90)'; ctx.fill();
    ctx.beginPath(); ctx.arc(mx+sx-sr*.25,capY+sy-sr*.3,sr*.4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fill();
  }
  ctx.beginPath(); ctx.ellipse(mx-capR*.32,capY-capR*.42,capR*.28,capR*.16,-0.5,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.28)'; ctx.fill();

  ctx.restore();
}

// ── TUNNEL ── dark hole with colored pair rim
function drawTunnel(r, c, pairColor) {
  const x=PAD+c*CELL, y=PAD+r*CELL, s=CELL;
  const mx=x+s/2, my=y+s/2, rad=s*.36;
  const anim = getObsAnim(`tunnel:${r}:${c}`);

  ctx.save();

  // Pulse ring — expands outward on enter or exit
  if(anim){
    const pulse = anim.t;
    const ringR = rad + pulse * rad * 0.9;
    const alpha = (1-pulse)*0.85;
    ctx.beginPath(); ctx.arc(mx,my,ringR,0,Math.PI*2);
    ctx.strokeStyle=pairColor.replace('#','rgba(').replace(/([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/i,
      (_,r,g,b)=>`rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},${alpha})`);
    ctx.strokeStyle = hexToRgba(pairColor, alpha);
    ctx.lineWidth=4; ctx.stroke();
  }

  // Outer colored rim
  ctx.beginPath(); ctx.arc(mx,my,rad,0,Math.PI*2);
  ctx.strokeStyle=pairColor; ctx.lineWidth=4; ctx.stroke();

  // Rim glow
  ctx.beginPath(); ctx.arc(mx,my,rad,0,Math.PI*2);
  ctx.strokeStyle=hexToRgba(pairColor,0.3); ctx.lineWidth=8; ctx.stroke();

  // Dark hole fill
  ctx.beginPath(); ctx.arc(mx,my,rad-3,0,Math.PI*2);
  ctx.fillStyle='#0a0a0f'; ctx.fill();

  // Depth gradient
  const depth=ctx.createRadialGradient(mx,my,0,mx,my,rad-3);
  depth.addColorStop(0,'rgba(0,0,0,1)'); depth.addColorStop(0.55,'rgba(0,0,0,0.85)');
  depth.addColorStop(0.82,'rgba(40,40,60,0.6)'); depth.addColorStop(1,'rgba(80,80,110,0.0)');
  ctx.beginPath(); ctx.arc(mx,my,rad-3,0,Math.PI*2); ctx.fillStyle=depth; ctx.fill();

  // Colored tint
  const tint=ctx.createRadialGradient(mx,my+rad*.3,0,mx,my+rad*.3,rad*.55);
  tint.addColorStop(0,hexToRgba(pairColor,0.18)); tint.addColorStop(1,hexToRgba(pairColor,0));
  ctx.beginPath(); ctx.arc(mx,my,rad-3,0,Math.PI*2); ctx.fillStyle=tint; ctx.fill();

  // Highlight crescent
  ctx.beginPath(); ctx.arc(mx,my,rad-3,Math.PI*1.1,Math.PI*1.9);
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=3; ctx.stroke();

  ctx.restore();
}

function hexToRgba(hex, alpha) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── NAVIGATOR ── reflective line in a cell
// orient: 'H' horizontal, 'V' vertical, 'D1' top-left↘bottom-right, 'D2' top-right↙bottom-left
function drawNavigator(r, c, orient) {
  const x = PAD+c*CELL, y = PAD+r*CELL, s = CELL;
  const mx = x+s/2, my = y+s/2;
  const half = s*0.38;
  const anim = getObsAnim(`nav:${r}:${c}`);

  ctx.save();

  let x1,y1,x2,y2;
  if(orient==='H'){  x1=mx-half; y1=my;      x2=mx+half; y2=my;      }
  if(orient==='V'){  x1=mx;      y1=my-half; x2=mx;      y2=my+half; }
  if(orient==='D1'){ x1=mx-half; y1=my-half; x2=mx+half; y2=my+half; }
  if(orient==='D2'){ x1=mx+half; y1=my-half; x2=mx-half; y2=my+half; }

  // Flash on hit: bright white pulse that fades
  const flashAlpha = anim ? Math.sin(anim.t * Math.PI) * 0.9 : 0;
  const lineColor = anim ? `rgba(${Math.round(56+flashAlpha*199)},${Math.round(189+flashAlpha*66)},248,1)` : '#38bdf8';
  const lineW = anim ? 4 + flashAlpha*4 : 4;

  ctx.shadowColor = anim ? `rgba(255,255,255,${flashAlpha*0.9})` : 'rgba(56,189,248,0.9)';
  ctx.shadowBlur = anim ? 8 + flashAlpha*16 : 8;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle=lineColor; ctx.lineWidth=lineW; ctx.lineCap='round'; ctx.stroke();

  ctx.shadowBlur=0;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = anim ? `rgba(255,255,255,${0.4+flashAlpha*0.6})` : '#e0f7ff';
  ctx.lineWidth=1.5; ctx.stroke();

  const dotColor = anim ? `rgba(255,255,255,${0.5+flashAlpha*0.5})` : '#7dd3fc';
  ctx.fillStyle=dotColor;
  for(const [ex,ey] of [[x1,y1],[x2,y2]]){
    ctx.beginPath(); ctx.arc(ex,ey, anim?3+flashAlpha*2:3, 0,Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

// ── BUNNY ── cute white bunny
function drawBunny(r, c, wiggle) {
  const x=PAD+c*CELL, y=PAD+r*CELL, s=CELL;
  const mx=x+s/2, my=y+s/2;
  const sc=s*0.18;
  const wv = wiggle ? Math.sin(performance.now()/70) * wiggle : 0;

  ctx.save();

  // Shadow
  ctx.beginPath();
  ctx.ellipse(mx, my+sc*2.2, sc*1.4, sc*0.4, 0, 0, Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.15)'; ctx.fill();

  // Body
  ctx.beginPath();
  ctx.ellipse(mx, my+sc*0.8, sc*1.15, sc*1.0, 0, 0, Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  // Head
  ctx.beginPath();
  ctx.ellipse(mx, my-sc*0.7, sc*0.88, sc*0.85, 0, 0, Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  // Ears — prominent wiggle
  for(const [side, ex] of [[-1,-sc*0.45],[1,sc*0.45]]){
    const earAngle = (ex<0?-0.15:0.15) + wv*side*0.55;
    ctx.beginPath();
    ctx.ellipse(mx+ex, my-sc*2.0, sc*0.24, sc*0.76, earAngle, 0, Math.PI*2);
    ctx.fillStyle='#f0eded'; ctx.fill();
    ctx.beginPath();
    ctx.ellipse(mx+ex, my-sc*2.0, sc*0.12, sc*0.50, earAngle, 0, Math.PI*2);
    ctx.fillStyle='#f9a8d4'; ctx.fill();
  }

  // Eyes — large with three-layer sparkle
  for(const ex of [-sc*0.33, sc*0.33]){
    // white base
    ctx.beginPath();
    ctx.ellipse(mx+ex, my-sc*0.82, sc*0.20, sc*0.23, 0, 0, Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
    // dark iris
    ctx.beginPath();
    ctx.ellipse(mx+ex, my-sc*0.82, sc*0.17, sc*0.20, 0, 0, Math.PI*2);
    ctx.fillStyle='#1a1a2e'; ctx.fill();
    // big highlight
    ctx.beginPath();
    ctx.arc(mx+ex+sc*0.07, my-sc*0.94, sc*0.09, 0, Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
    // small sparkle
    ctx.beginPath();
    ctx.arc(mx+ex+sc*0.14, my-sc*0.78, sc*0.045, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fill();
    // tiny star sparkle
    ctx.beginPath();
    ctx.arc(mx+ex-sc*0.06, my-sc*0.96, sc*0.03, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fill();
  }

  // Rosy cheeks — large and vivid
  for(const ex of [-sc*0.58, sc*0.58]){
    const cg = ctx.createRadialGradient(mx+ex, my-sc*0.50, 0, mx+ex, my-sc*0.50, sc*0.32);
    cg.addColorStop(0, 'rgba(255,140,170,0.65)');
    cg.addColorStop(1, 'rgba(255,140,170,0)');
    ctx.beginPath();
    ctx.ellipse(mx+ex, my-sc*0.50, sc*0.32, sc*0.20, 0, 0, Math.PI*2);
    ctx.fillStyle=cg; ctx.fill();
  }

  // Nose
  ctx.beginPath();
  ctx.arc(mx, my-sc*0.56, sc*0.11, 0, Math.PI*2);
  ctx.fillStyle='#f472b6'; ctx.fill();
  // nose shine
  ctx.beginPath();
  ctx.arc(mx-sc*0.04, my-sc*0.60, sc*0.04, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.fill();

  // Smile — wide and clear
  ctx.beginPath();
  ctx.arc(mx, my-sc*0.38, sc*0.22, 0.25, Math.PI-0.25);
  ctx.strokeStyle='rgba(210,100,140,0.75)'; ctx.lineWidth=sc*0.16; ctx.lineCap='round'; ctx.stroke();

  // Tail
  ctx.beginPath();
  ctx.arc(mx+sc*1.0, my+sc*0.6, sc*0.30, 0, Math.PI*2);
  ctx.fillStyle='#f5f5f5'; ctx.fill();

  ctx.restore();
}


function drawSpeedBadge(wp0, wp1, speed, color) {
  // Draw chevrons at midpoint of patrol path indicating speed
  const mx = PAD + (wp0.c + wp1.c) / 2 * CELL + CELL/2;
  const my = PAD + (wp0.r + wp1.r) / 2 * CELL + CELL/2;
  const chevrons = speed === 'slow' ? '›' : speed === 'fast' ? '›››' : '››';
  ctx.save();
  ctx.font = `bold ${Math.round(CELL * 0.22)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // background pill
  const tw = ctx.measureText(chevrons).width;
  const pw = tw + 8, ph = CELL * 0.26;
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath();
  ctx.roundRect(mx - pw/2, my - ph/2, pw, ph, ph/2);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.fillText(chevrons, mx, my);
  ctx.restore();
}

function cx(c){return PAD+c*CELL+CELL/2;}
function cy(r){return PAD+r*CELL+CELL/2;}

function render() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Canvas background (visible around rounded board corners)
  ctx.fillStyle = '#a8e063';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawBoard();

  for(const s of snakes) if(s.alive) drawSnake(s);
}

function drawSnake(s) {
  const totalCells = s.cells.length;
  const hidden = s.tunnelHidden || 0; // tail segments currently inside tunnel
  // visible = all segments except the last `hidden` ones
  const visibleCount = Math.max(1, totalCells - hidden);

  // Build interpolated points only for visible segments
  const pts = [];
  for(let i=0; i<visibleCount; i++) pts.push(interpPt(s,i));
  if(!pts.length) return;

  const hovH = hovered && hovered.id===s.id && hovered.end==='head';
  const hovT = hovered && hovered.id===s.id && hovered.end==='tail';
  const anyHov = hovH || hovT;

  // If completely inside tunnel, draw nothing
  if(hidden >= totalCells) return;

  ctx.save();
  if(anyHov){ ctx.shadowColor=s.color; ctx.shadowBlur=14; }

  // body — draw full path first, then head drawn on top covers the round cap
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.strokeStyle=s.color; ctx.lineWidth=CELL*0.54;
  ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();

  // shine
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=CELL*0.16;
  ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();

  ctx.shadowBlur=0;

  // head face (always visible unless all hidden)
  drawSnakeFace(pts[0], s.dirs[0], s.color, hovH, s.id+'h');

  // frozen indicator — pulsing ring prompting player to tap
  if(s.frozen){
    const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 220);
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.beginPath(); ctx.arc(pts[0][0], pts[0][1], CELL*0.44, 0, Math.PI*2);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
    ctx.beginPath(); ctx.arc(pts[0][0], pts[0][1], CELL*0.44, 0, Math.PI*2);
    ctx.strokeStyle = s.color; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // tail end
  if(hidden === 0) {
    // tail fully visible
    if(s.dirs[1]) {
      drawSnakeFace(pts[pts.length-1], s.dirs[1], s.color, hovT, s.id+'t');
    } else {
      const t=pts[pts.length-1];
      ctx.beginPath(); ctx.arc(t[0],t[1],CELL*0.18,0,Math.PI*2);
      ctx.fillStyle=s.color; ctx.fill();
    }
  }
  // if tail is hidden (inside tunnel), draw a fading stub at the last visible point
  else if(visibleCount > 0) {
    const t=pts[pts.length-1];
    const fadeR = CELL*0.18*(1 - hidden/totalCells);
    ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.arc(t[0],t[1],Math.max(2,fadeR),0,Math.PI*2);
    ctx.fillStyle=s.color; ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ── TONGUE ANIMATION STATE ──
// tongueStates[faceKey] = { scale: 0..1, out: bool, timer: ms until next change }
const tongueStates = {};

function getTongueScale(faceKey) {
  const now = performance.now();
  if (!tongueStates[faceKey]) {
    tongueStates[faceKey] = { scale: 0, out: false, nextFlick: now + 600 + Math.random()*1400 };
  }
  const st = tongueStates[faceKey];
  if (now >= st.nextFlick) {
    st.out = !st.out;
    st.nextFlick = now + (st.out ? 120 + Math.random()*180 : 500 + Math.random()*1200);
  }
  const target = st.out ? 1 : 0;
  st.scale += (target - st.scale) * 0.35;
  return st.scale;
}

function drawSnakeFace(pt, dir, color, glowing, faceKey) {
  const angle = DIR_ANGLE[dir];
  const R = CELL * 0.30;
  const tx = pt[0], ty = pt[1];

  ctx.save();
  ctx.translate(tx, ty);
  ctx.rotate(angle);

  // glow ring when hovered
  if(glowing){
    ctx.beginPath(); ctx.arc(0,0,R*1.5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fill();
  }

  // ── TONGUE (drawn behind head) ──
  const tScale = getTongueScale(faceKey);
  if (tScale > 0.01) {
    const tBase = R * 0.92;
    const tLen  = R * 0.55 * tScale;
    const tFork = R * 0.16 * tScale;

    ctx.save();
    ctx.strokeStyle = '#ff4d6d';
    ctx.lineWidth   = R * 0.13;
    ctx.lineCap     = 'round';

    ctx.beginPath();
    ctx.moveTo(tBase, 0);
    ctx.lineTo(tBase + tLen * 0.5, 0);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(tBase + tLen * 0.5, 0);
    ctx.lineTo(tBase + tLen, -tFork);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(tBase + tLen * 0.5, 0);
    ctx.lineTo(tBase + tLen,  tFork);
    ctx.stroke();
    ctx.restore();
  }

  // ── HEAD CIRCLE ──
  ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2);
  ctx.fillStyle = color; ctx.fill();

  // slight darker shade on back half
  const grad = ctx.createLinearGradient(-R,0,R,0);
  grad.addColorStop(0,'rgba(0,0,0,0.0)');
  grad.addColorStop(1,'rgba(0,0,0,0.18)');
  ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2);
  ctx.fillStyle=grad; ctx.fill();

  // ── EYES ──
  // eyes sit at ±35° from forward axis, slightly forward
  const eyeDist  = R * 0.52;
  const eyeY     = R * 0.38;
  const eyeR     = R * 0.26;
  const pupilR   = eyeR * 0.52;

  for(const ey of [-eyeY, eyeY]){
    // white sclera
    ctx.beginPath(); ctx.arc(eyeDist, ey, eyeR, 0, Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();

    // pupil (slightly forward-offset for direction feel)
    ctx.beginPath(); ctx.arc(eyeDist + pupilR*0.3, ey, pupilR, 0, Math.PI*2);
    ctx.fillStyle='#111'; ctx.fill();

    // catchlight
    ctx.beginPath(); ctx.arc(eyeDist + pupilR*0.3 + pupilR*0.3, ey - pupilR*0.4, pupilR*0.32, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fill();
  }

  ctx.restore();
}

function rRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ─── HIT TEST ───
function snakeAtCell(r,c,excludeId=-1){
  for(const s of snakes){
    if(!s.alive||s.id===excludeId) continue;
    if(s.cells.some(x=>x.r===r&&x.c===c)) return s;
  }
  return null;
}

function snakeBodyAtPixel(px,py,s){
  const c=Math.floor((px-PAD)/CELL), r=Math.floor((py-PAD)/CELL);
  return s.cells.some(cell=>cell.r===r&&cell.c===c);
}
function snakeEndAtPixel(px,py){
  const c=Math.floor((px-PAD)/CELL), r=Math.floor((py-PAD)/CELL);
  if(r<0||r>=ROWS||c<0||c>=COLS) return null;
  for(const s of snakes){
    if(!s.alive) continue;
    const head=s.cells[0], tail=s.cells[s.cells.length-1];
    if(head.r===r&&head.c===c) return {snake:s, end:'head'};
    if(s.dirs[1] && tail.r===r&&tail.c===c) return {snake:s, end:'tail'};
    if(s.cells.some(x=>x.r===r&&x.c===c)) return {snake:s, end:'head'};
  }
  return null;
}

// ─── OBSTACLE HELPERS ───
// ─── PATROL ANIMATION ───
const PATROL_SPEEDS = { slow: 0.4, medium: 0.9, fast: 1.6 };

function patrolSpeed(obs) {
  return PATROL_SPEEDS[obs.speed] ?? PATROL_SPEEDS.medium;
}

function updatePatrols(dt) {
  for(const s of STONES) {
    if(!s.patrol) continue;
    s.pt += s.pdir * dt * patrolSpeed(s);
    if(s.pt >= 1){ s.pt=1; s.pdir=-1; }
    else if(s.pt <= 0){ s.pt=0; s.pdir=1; }
    s.pr = s.patrol[0].r + (s.patrol[1].r - s.patrol[0].r) * s.pt;
    s.pc = s.patrol[0].c + (s.patrol[1].c - s.patrol[0].c) * s.pt;
  }
  for(const b of BUNNIES) {
    if(!b.patrol || b.eaten) continue;
    b.pt += b.pdir * dt * patrolSpeed(b);
    if(b.pt >= 1){ b.pt=1; b.pdir=-1; }
    else if(b.pt <= 0){ b.pt=0; b.pdir=1; }
    b.pr = b.patrol[0].r + (b.patrol[1].r - b.patrol[0].r) * b.pt;
    b.pc = b.patrol[0].c + (b.patrol[1].c - b.patrol[0].c) * b.pt;
  }
}

function isStone(r,c) {
  return STONES.some(s => {
    const cr = Math.round(s.pr ?? s.r), cc = Math.round(s.pc ?? s.c);
    return cr===r && cc===c;
  });
}
function isBouncer(r,c) { return BOUNCERS.some(b=>b.r===r&&b.c===c); }
function isBunny(r,c) {
  return BUNNIES.find(b => {
    if(b.eaten) return false;
    const cr = Math.round(b.pr ?? b.r), cc = Math.round(b.pc ?? b.c);
    return cr===r && cc===c;
  }) || null;
}
function tunnelExit(r,c){
  for(const pair of TUNNELS){
    if(pair[0].r===r&&pair[0].c===c) return pair[1];
    if(pair[1].r===r&&pair[1].c===c) return pair[0];
  }
  return null;
}
function navigatorAt(r,c){ return NAVIGATORS.find(n=>n.r===r&&n.c===c)||null; }

// Navigator reflection:
// orient H:  parallel={L,R}->fail, perp={U,D}->reverse, diag: flip row-component
// orient V:  parallel={U,D}->fail, perp={L,R}->reverse, diag: flip col-component
// orient D1(\\): parallel={UL,DR_}->fail, perp={UR,DL}->reverse, ortho: swap components
// orient D2(/): parallel={UR,DL}->fail, perp={UL,DR_}->reverse, ortho: swap+negate
const NAV_REFLECT = {
  H:  { L:'fail', R:'fail', U:'D', D:'U', UL:'DL', UR:'DR_', DL:'UL', 'DR_':'UR'  },
  V:  { U:'fail', D:'fail', L:'R', R:'L', UL:'UR', UR:'UL',  DL:'DR_','DR_':'DL'  },
  D1: { UL:'fail','DR_':'fail', UR:'DL', DL:'UR',  U:'L',  L:'U',  D:'R',  R:'D'  },
  D2: { UR:'fail', DL:'fail', UL:'DR_','DR_':'UL', U:'R',  R:'U',  D:'L',  L:'D'  },
};
function navigateDir(dir, orient){
  const table = NAV_REFLECT[orient];
  return table ? (table[dir] || dir) : dir;
}

const OPP_DIR = {U:'D',D:'U',L:'R',R:'L',UL:'DR_',DR_:'UL',UR:'DL',DL:'UR'};

// ─── SMOOTH ANIMATION ───
const MOVE_SPEED = 22;
function dirDelta(dir){ return [DR[dir], DC[dir]]; }
function deltaToDir(dr,dc){ return Object.keys(DR).find(k=>DR[k]===dr&&DC[k]===dc)||'U'; }

function fireSnake(s, end){
  if(!s.alive) return;
  // If this snake is frozen (just ate a bunny), resume it
  if(s.frozen){
    const {dr, dc, dir} = s.frozen;
    s.frozen = null;
    animating = true; hovered = null;
    startMove(s, dr, dc, dir);
    return;
  }
  if(animating) return;
  animating=true; hovered=null;
  if(end==='tail'){ s.cells.reverse(); s.dirs.reverse(); }
  const [dr,dc] = dirDelta(s.dirs[0]);
  startMove(s, dr, dc, s.dirs[0]);
}

function classifyStep(nr, nc, snakeId, movingDir) {
  if(isStone(nr,nc))   return 'stone';
  if(isBouncer(nr,nc)) return 'bounce';
  const te = tunnelExit(nr,nc);
  if(te) return {tunnel: te};
  const nav = navigatorAt(nr,nc);
  if(nav && movingDir){
    const result = navigateDir(movingDir, nav.orient);
    if(result === 'fail') return 'stone';
    if(result === movingDir) return 'free';
    return {navigate: result};
  }
  const bun = isBunny(nr,nc);
  if(bun) return {eat_bunny: bun};
  if(snakeAtCell(nr,nc,snakeId)) return 'snake_hit';
  if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return 'exit';
  return 'free';
}

function startMove(s, dr, dc, dir){
  const head = s.cells[0];
  const nr = head.r+dr, nc = head.c+dc;
  // find the dir string from dr/dc if not provided
  if(!dir) dir = Object.keys(DR).find(k=>DR[k]===dr&&DC[k]===dc) || 'U';
  const what = classifyStep(nr, nc, s.id, dir);

  if(what==='stone'||what==='snake_hit'){
    if(what==='stone') triggerObsAnim(`stone:${nr}:${nc}`, 'stone_hit', 0.5);
    Music.playSfx('stone');
    s.anim={dr,dc,progress:0,nextCells:[{r:nr,c:nc},...s.cells.slice(0,-1)],result:what==='stone'?'stone':'collision'};
    runAnim(); return;
  }
  if(what==='bounce'){
    triggerObsAnim(`bouncer:${nr}:${nc}`, 'bouncer_hit', 0.5);
    s.anim={dr,dc,progress:0,nextCells:[{r:nr,c:nc},...s.cells.slice(0,-1)],result:'bounce'};
    runAnim(); return;
  }
  if(what&&what.eat_bunny){
    what.eat_bunny.eaten=true;
    triggerObsAnim(`bunny:${nr}:${nc}`, 'bunny_eat', 0.55);
    const nextCells=[{r:nr,c:nc},...s.cells.slice(0,-1)];
    s.anim={dr,dc,progress:0,nextCells,result:'eat_and_freeze',pendingDr:dr,pendingDc:dc,pendingDir:dir};
    runAnim(); return;
  }
  if(what&&what.navigate){
    triggerObsAnim(`nav:${nr}:${nc}`, 'nav_hit', 0.4);
    Music.playSfx('navigate');
    s.anim={dr,dc,progress:0,nextCells:[{r:nr,c:nc},...s.cells.slice(0,-1)],result:'navigate',newDir:what.navigate};
    runAnim(); return;
  }
  if(what&&what.tunnel){
    triggerObsAnim(`tunnel:${nr}:${nc}`, 'tunnel_enter', 0.4);
    Music.playSfx('tunnel_enter');
    s.tunnelHidden = 0;
    s.anim={dr,dc,progress:0,nextCells:[{r:nr,c:nc},...s.cells.slice(0,-1)],
            result:'tunnel_enter', tunnelEntry:{r:nr,c:nc}, tunnelExit_:what.tunnel, hiddenCount:1};
    runAnim(); return;
  }
  s.anim={dr,dc,progress:0,nextCells:[{r:nr,c:nc},...s.cells.slice(0,-1)],result:what==='exit'?'exit':'free'};
  runAnim();
}

function runAnim(){
  let last=null;
  function frame(ts){
    if(!last) last=ts;
    const dt=(ts-last)/1000; last=ts;
    let anyMoving=false;
    updatePatrols(dt);
    updateObsAnims(dt);
    for(const s of snakes){
      if(!s.alive||!s.anim) continue;
      s.anim.progress=Math.min(s.anim.progress+dt*MOVE_SPEED,1);
      anyMoving=true;
    }
    render();

    for(const s of snakes){
      if(!s.alive||!s.anim||s.anim.progress<1) continue;
      const a=s.anim; s.anim=null;

      if(a.result==='stone'||a.result==='collision'){
        s.alive=false; loseLife(); shakeCanvas(); render();
        animating=false; checkWin(); return;
      }

      s.cells = a.nextCells;

      // ── ate a bunny → freeze, wait for player tap ──
      if(a.result==='eat_and_freeze'){
        Music.playSfx('eat');
        s.frozen = {dr:a.pendingDr, dc:a.pendingDc, dir:a.pendingDir};
        animating = false;
        render(); checkWin(); return;
      }

      // ── navigate: snake hit a navigator line, change direction ──
      if(a.result==='navigate'){
        const newDir=a.newDir;
        if(newDir===OPP_DIR[deltaToDir(a.dr,a.dc)]){
          // perpendicular → reverse: just reverse dr/dc
        }
        const [ndr,ndc]=dirDelta(newDir);
        const h=s.cells[0], nr2=h.r+ndr, nc2=h.c+ndc;
        const w2=classifyStep(nr2,nc2,s.id,newDir);
        nextStep(s,ndr,ndc,w2,nr2,nc2,frame,newDir); return;
      }

      if(a.result==='bounce'){
        Music.playSfx('bounce');
        const newDr=-a.dr, newDc=-a.dc;
        const newDir2=deltaToDir(newDr,newDc);
        const h=s.cells[0], nr2=h.r+newDr, nc2=h.c+newDc;
        const w2=classifyStep(nr2,nc2,s.id,newDir2);
        if(w2==='stone'||w2==='snake_hit'||w2==='bounce'){ animating=false; checkWin(); return; }
        s.anim={dr:newDr,dc:newDc,progress:0,nextCells:[{r:nr2,c:nc2},...s.cells.slice(0,-1)],
                result:w2==='exit'?'exit':w2&&w2.tunnel?'tunnel_enter':w2&&w2.navigate?'navigate':'free',
                newDir:w2&&w2.navigate?w2.navigate:null,
                tunnelEntry:w2&&w2.tunnel?{r:nr2,c:nc2}:null,
                tunnelExit_:w2&&w2.tunnel?w2.tunnel:null, hiddenCount:w2&&w2.tunnel?1:0};
        requestAnimationFrame(frame); return;
      }

      // ── tunnel_enter: each step, one more tail segment gets hidden ──
      if(a.result==='tunnel_enter'){
        const entry=a.tunnelEntry, exit=a.tunnelExit_;
        const hidden=a.hiddenCount; // how many segments are now inside (invisible)
        s.tunnelHidden = hidden;

        if(hidden>=s.cells.length){
          // whole snake is inside — teleport all cells to exit, start emerging
          s.cells = s.cells.map(()=>({r:exit.r,c:exit.c}));
          s.tunnelHidden = s.cells.length;
          // first emerge step: head moves one cell past exit
          const h=s.cells[0], nr2=h.r+a.dr, nc2=h.c+a.dc;
          const curDir=deltaToDir(a.dr,a.dc);
          const w2=classifyStep(nr2,nc2,s.id,curDir);
          if(w2==='stone'||w2==='snake_hit'){
            s.anim={dr:a.dr,dc:a.dc,progress:0,nextCells:[{r:nr2,c:nc2},...s.cells.slice(0,-1)],result:w2==='stone'?'stone':'collision'};
          } else {
            s.anim={dr:a.dr,dc:a.dc,progress:0,nextCells:[{r:nr2,c:nc2},...s.cells.slice(0,-1)],
                    result:'tunnel_exit', tunnelEntry:entry, tunnelExit_:exit,
                    hiddenCount:s.cells.length-1};
          }
          requestAnimationFrame(frame); return;
        }

        // keep feeding in: head stays on entry, everything shifts toward entry
        const next=[{r:entry.r,c:entry.c},...s.cells.slice(0,-1)];
        s.anim={dr:a.dr,dc:a.dc,progress:0,nextCells:next,result:'tunnel_enter',
                tunnelEntry:entry,tunnelExit_:exit,hiddenCount:hidden+1};
        requestAnimationFrame(frame); return;
      }

      // ── tunnel_exit: each step reveals one more segment ──
      if(a.result==='tunnel_exit'){
        const entry=a.tunnelEntry, exit=a.tunnelExit_;
        const hidden=Math.max(0,a.hiddenCount-1);
        s.tunnelHidden = hidden;
        // Trigger exit glow on first emergence
        if(a.hiddenCount===s.cells.length-1)
          triggerObsAnim(`tunnel:${exit.r}:${exit.c}`, 'tunnel_exit', 0.5);
          Music.playSfx('tunnel_exit');

        if(hidden===0){
          s.tunnelHidden = 0;
          const h=s.cells[0], nr2=h.r+a.dr, nc2=h.c+a.dc;
          const d=deltaToDir(a.dr,a.dc);
          nextStep(s,a.dr,a.dc,classifyStep(nr2,nc2,s.id,d),nr2,nc2,frame,d); return;
        }
        // keep emerging
        const h=s.cells[0], nr2=h.r+a.dr, nc2=h.c+a.dc;
        const w2=classifyStep(nr2,nc2,s.id,deltaToDir(a.dr,a.dc));
        if(w2==='stone'||w2==='snake_hit'){
          s.anim={dr:a.dr,dc:a.dc,progress:0,nextCells:[{r:nr2,c:nc2},...s.cells.slice(0,-1)],result:w2==='stone'?'stone':'collision'};
        } else {
          s.anim={dr:a.dr,dc:a.dc,progress:0,nextCells:[{r:nr2,c:nc2},...s.cells.slice(0,-1)],
                  result:'tunnel_exit',tunnelEntry:entry,tunnelExit_:exit,hiddenCount:hidden};
        }
        requestAnimationFrame(frame); return;
      }

      if(a.result==='exit'){
        const allOut=s.cells.every(c=>c.r<0||c.r>=ROWS||c.c<0||c.c>=COLS);
        if(allOut){
          s.alive=false; render();
          Music.playSfx('exit');
          const rect=canvas.getBoundingClientRect();
          const scx=canvas.width/rect.width,scy=canvas.height/rect.height;
          burst(rect.left+cx(s.cells[0].c)/scx,rect.top+cy(s.cells[0].r)/scy,s.color);
          animating=false; checkWin(); return;
        }
        const nr2=s.cells[0].r+a.dr, nc2=s.cells[0].c+a.dc;
        s.anim={dr:a.dr,dc:a.dc,progress:0,nextCells:[{r:nr2,c:nc2},...s.cells.slice(0,-1)],result:'exit'};
        requestAnimationFrame(frame); return;
      }

      // free — next step
      const h=s.cells[0], nr2=h.r+a.dr, nc2=h.c+a.dc;
      const d=deltaToDir(a.dr,a.dc);
      nextStep(s,a.dr,a.dc,classifyStep(nr2,nc2,s.id,d),nr2,nc2,frame,d); return;
    }
    if(anyMoving) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function nextStep(s,dr,dc,what,nr,nc,frame,dir){
  if(!dir) dir=deltaToDir(dr,dc);
  if(what==='stone'||what==='snake_hit'){
    s.anim={dr,dc,progress:0,nextCells:[{r:nr,c:nc},...s.cells.slice(0,-1)],result:what==='stone'?'stone':'collision'};
    requestAnimationFrame(frame); return;
  }
  if(what==='bounce'){
    s.anim={dr,dc,progress:0,nextCells:[{r:nr,c:nc},...s.cells.slice(0,-1)],result:'bounce'};
    requestAnimationFrame(frame); return;
  }
  if(what&&what.eat_bunny){
    what.eat_bunny.eaten=true;
    s.anim={dr,dc,progress:0,nextCells:[{r:nr,c:nc},...s.cells.slice(0,-1)],
            result:'eat_and_freeze',pendingDr:dr,pendingDc:dc,pendingDir:dir};
    requestAnimationFrame(frame); return;
  }
  if(what&&what.navigate){
    s.anim={dr,dc,progress:0,nextCells:[{r:nr,c:nc},...s.cells.slice(0,-1)],result:'navigate',newDir:what.navigate};
    requestAnimationFrame(frame); return;
  }
  if(what&&what.tunnel){
    s.tunnelHidden=0;
    s.anim={dr,dc,progress:0,nextCells:[{r:nr,c:nc},...s.cells.slice(0,-1)],
            result:'tunnel_enter',tunnelEntry:{r:nr,c:nc},tunnelExit_:what.tunnel,hiddenCount:1};
    requestAnimationFrame(frame); return;
  }
  s.anim={dr,dc,progress:0,nextCells:[{r:nr,c:nc},...s.cells.slice(0,-1)],result:what==='exit'?'exit':'free'};
  requestAnimationFrame(frame);
}

// Interpolated pixel position for a cell during animation
function interpPt(s, cellIdx){
  if(!s.anim){
    const cell=s.cells[cellIdx];
    return [cx(cell.c), cy(cell.r)];
  }
  const t=s.anim.progress;
  // head (idx 0): moves from old head toward new head
  // each body segment: moves from cells[i] toward cells[i-1] (follow-the-leader)
  const curr=s.cells[cellIdx];
  const next=s.anim.nextCells[cellIdx];
  return [
    cx(curr.c)+(cx(next.c)-cx(curr.c))*t,
    cy(curr.r)+(cy(next.r)-cy(curr.r))*t
  ];
}

// ─── LIVES / WIN ───
function loseLife(){
  lives=Math.max(0,lives-1); updateHearts();
  Music.playSfx('lose');
  if(lives===0) setTimeout(()=>showOverlay('lose'),600);
}
function updateHearts(){
  for(let i=1;i<=3;i++) document.getElementById(`h${i}`).classList.toggle('lost',i>lives);
}
function checkWin(){
  if(lives===0) return;
  const allSnakesGone = snakes.every(s=>!s.alive);
  const allBunniesEaten = BUNNIES.every(b=>b.eaten);
  if(allSnakesGone && allBunniesEaten) setTimeout(()=>{
    Music.stop();
    Music.playSfx('win');
    document.getElementById('ov-win-sub').textContent=
      levelIdx<LEVELS.length-1?'All snakes freed! ✨':'All levels complete! 🏆';
    showOverlay('win');
  },400);
  else if(allSnakesGone && !allBunniesEaten){
    // Hint — bunnies remain
    document.getElementById('hint').textContent='🐰 Feed all bunnies first!';
  }
}
function showOverlay(w){
  document.getElementById('ov-win').classList.toggle('show',w==='win');
  document.getElementById('ov-lose').classList.toggle('show',w==='lose');
}
function hideOverlays(){
  document.getElementById('ov-win').classList.remove('show');
  document.getElementById('ov-lose').classList.remove('show');
}

// ─── INPUT ───
function getPixel(e){
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  const src=e.touches?e.touches[0]:e;
  return [(src.clientX-rect.left)*sx,(src.clientY-rect.top)*sy];
}
canvas.addEventListener('pointerdown',e=>{
  const [px,py]=getPixel(e);
  // Check obstacle tap first (only when not animating)
  if(!animating){
    const obs = obstacleAtPixel(px,py);
    if(obs){ enqueueObstacleInfo([obs], null); return; }
  }
  // Allow tapping a frozen snake even while "animating" is false but a freeze is active
  const frozenSnake = snakes.find(s=>s.alive&&s.frozen&&snakeBodyAtPixel(px,py,s));
  if(frozenSnake){ fireSnake(frozenSnake, 'head'); return; }
  if(animating) return;
  const hit=snakeEndAtPixel(px,py);
  if(hit) fireSnake(hit.snake, hit.end);
});
canvas.addEventListener('pointermove',e=>{
  if(animating) return;
  const [px,py]=getPixel(e);
  const obs = obstacleAtPixel(px,py);
  if(obs){ canvas.style.cursor='pointer'; return; }
  const hit=snakeEndAtPixel(px,py);
  const c=Math.floor((px-PAD)/CELL), r=Math.floor((py-PAD)/CELL);
  let newHov=null;
  if(hit){
    const s=hit.snake;
    const end=hit.end;
    const endCell = end==='head' ? s.cells[0] : s.cells[s.cells.length-1];
    if(endCell.r===r && endCell.c===c) newHov={id:s.id, end};
    else if(end==='head' && s.cells[0].r===r && s.cells[0].c===c) newHov={id:s.id,end:'head'};
  }
  const changed = JSON.stringify(newHov)!==JSON.stringify(hovered);
  if(changed){ hovered=newHov; render(); }
  canvas.style.cursor=hit?'pointer':'default';
});
canvas.addEventListener('pointerleave',()=>{if(hovered){hovered=null;render();}});
